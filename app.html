  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('tab-login-btn').classList.toggle('active', tab === 'login');

  hideAuthMessages();
}

function toggleLang() {
  lang = lang === 'es' ? 'en' : 'es';
  localStorage.setItem('mbp-lang', lang);
  applyLangToStaticElements();
  renderNav();
  renderPage(currentPage);
}

  document.getElementById('auth-nosub-text').textContent = L.noSubText;
  document.getElementById('auth-stripe-btn').textContent = L.stripeBtn;

function showAuthError(msg){

async function doLogin() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const password = document.getElementById('login-password').value;
  if(!email || !password){ showAuthError(TRANSLATIONS[lang].errEmailPass); return; }
  const { error } = await _supabase.auth.signInWithPassword({ email, password });
  if(error){ showAuthError(TRANSLATIONS[lang].errWrongCreds); }
}

async function doSignup(){
  const email = document.getElementById('signup-email').value.trim().toLowerCase();
  const password = document.getElementById('signup-password').value;
  const confirm = document.getElementById('signup-confirm').value;
  const L = TRANSLATIONS[lang];
  if(!email || !password){ showAuthError(L.errFillAll); return; }
  if(password.length < 6){ showAuthError(L.errPassLength); return; }
  if(password !== confirm){ showAuthError(L.errPassMatch); return; }
  const { data, error } = await _supabase.auth.signUp({ email, password });
  if(error){ showAuthError(L.errSignupPrefix + error.message); return; }
  if(data.user){
    const { data: existing } = await _supabase.from("users").select("id, is_paid").eq("email", data.user.email).maybeSingle();
    if(existing){
      // A row for this email already exists (e.g. created by the payment webhook before signup).
      // Attach the new auth id to it instead of creating a duplicate row.
      await _supabase.from("users").update({ id: data.user.id }).eq("email", data.user.email);
    } else {
      await _supabase.from("users").insert({ id: data.user.id, email: data.user.email, is_paid: false });
    }
  }
  const sEl = document.getElementById('auth-success');
  sEl.textContent = L.successSignup;
  sEl.classList.add('show');
}

async function doLogout(){
  await _supabase.auth.signOut();
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-container').style.display = 'none';
  document.getElementById('user-bar').style.display = 'none';
  document.getElementById('login-email').value = '';
  document.getElementById('login-password').value = '';
}

    // Token refreshed in background — just keep currentUser updated, never re-render
    if(event === 'TOKEN_REFRESHED') return;

    // Already running — don't re-initialize
    if(appInitialized) return;

    const isAdmin = ADMIN_EMAILS.includes(session.user.email);

    if(!isAdmin){
      let { data } = await _supabase
        .from("users")
        .select("is_paid, id")
        .eq("id", session.user.id)
        .single();

      if(!data) {
        const { data: emailData } = await _supabase
          .from("users")
          .select("is_paid, id")
          .eq("email", session.user.email)
          .single();
        
        if(emailData && emailData.is_paid) {
          await _supabase
            .from("users")
            .update({ id: session.user.id })
            .eq("email", session.user.email);
          data = emailData;
        }
      }

      if(!data || !data.is_paid){
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('app-container').style.display = 'none';
        document.getElementById('user-bar').style.display = 'none';
        showAuthError(lang === 'es' ? "Debes suscribirte para acceder. Si ya pagaste, espera unos minutos e intenta de nuevo." : "You must subscribe to access. If you already paid, wait a moment and try again.");
        return;
      }
    }

    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-container').style.display = 'flex';
    document.getElementById('user-bar').style.display = 'flex';
    document.getElementById('user-email-display').textContent = session.user.email;

    await loadFromCloud();
    applyLangToStaticElements();
    renderNav();
    renderPage('dashboard');
    appInitialized = true;

  } else {
    appInitialized = false;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-container').style.display = 'none';
  }
});

// ── SMART INGREDIENT COST CALCULATOR ─────────────────────────────────────────
// gramsPerCup values are standard published baking-conversion estimates
// (e.g. King Arthur Baking-style charts). They're approximations, not lab
// measurements — close enough for pricing, but the user can always override
// the final cost manually. Ordered specific → generic so e.g. "azúcar glass"
// matches before plain "azúcar".
const PKG_WEIGHT_UNITS=["g","kg","oz","lb"];
const PKG_VOLUME_UNITS=["ml","L"];
const KITCHEN_VOLUME_UNITS=["taza","cdta","cda"];
const WEIGHT_TO_G={g:1,kg:1000,oz:28.3495,lb:453.592};
const VOLUME_TO_ML={ml:1,L:1000,taza:240,cdta:5,cda:15};

function unitCategory(u){
  if(PKG_WEIGHT_UNITS.includes(u))return"weight";
  if(PKG_VOLUME_UNITS.includes(u)||KITCHEN_VOLUME_UNITS.includes(u))return"volume";
  return"count"; // unidad, paquete
}

function matchDensity(name){
  const n=normalizeName(name);
  if(!n)return null;
  for(const entry of DENSITY_TABLE){
    for(const kw of entry.keywords){
      if(n.includes(normalizeName(kw)))return entry;
    }
  }
  return null;
}

// Returns {ok:true, yield, costPerUnit, note} or {ok:false, reason}
function calcSmartCost(name,pkgAmount,pkgUnit,pkgPrice,targetUnit){
  if(!pkgAmount||!pkgUnit||!pkgPrice||pkgAmount<=0||pkgPrice<=0){
    return{ok:false,reason:"incomplete"};
  }
  // count→count: e.g. bought 12 unidades, recipe uses per unidad
  if(pkgUnit==="unidad"&&(targetUnit==="unidad"||targetUnit==="paquete")){
    const costPerUnit=pkgPrice/pkgAmount;
    return{ok:true,yieldInTarget:pkgAmount,costPerUnit,usedDensity:false,densityLabel:""};
  }
  if(targetUnit==="unidad"||targetUnit==="paquete"){
    return{ok:false,reason:"count"};
  }
  const pkgCat=unitCategory(pkgUnit), targetCat=unitCategory(targetUnit);
  if(pkgCat==="count"||targetCat==="count")return{ok:false,reason:"count"};

  let yieldInTarget;
  let usedDensity=false, densityLabel="";

  if(pkgCat==="weight"&&targetCat==="weight"){
    const grams=pkgAmount*WEIGHT_TO_G[pkgUnit];
    yieldInTarget=grams/WEIGHT_TO_G[targetUnit];
  }else if(pkgCat==="volume"&&targetCat==="volume"){
    const ml=pkgAmount*VOLUME_TO_ML[pkgUnit];
    yieldInTarget=ml/VOLUME_TO_ML[targetUnit];
  }else{
    // crossing weight <-> volume: need ingredient density
    const match=matchDensity(name);
    if(!match)return{ok:false,reason:"unrecognized"};
    usedDensity=true; densityLabel=match.label;
    const densityGPerMl=match.gramsPerCup/240;
    if(pkgCat==="weight"&&targetCat==="volume"){
      const grams=pkgAmount*WEIGHT_TO_G[pkgUnit];
      const ml=grams/densityGPerMl;
      yieldInTarget=ml/VOLUME_TO_ML[targetUnit];
    }else{ // volume -> weight
      const ml=pkgAmount*VOLUME_TO_ML[pkgUnit];
      const grams=ml*densityGPerMl;
      yieldInTarget=grams/WEIGHT_TO_G[targetUnit];
    }
  }
  if(!yieldInTarget||yieldInTarget<=0)return{ok:false,reason:"incomplete"};
  const costPerUnit=pkgPrice/yieldInTarget;
  return{ok:true,yieldInTarget,costPerUnit,usedDensity,densityLabel};
}

// ── COST HELPERS ──────────────────────────────────────────────────────────────
const getOverheadPerOrder=()=>DB.settings.estimatedMonthlyOrders>0?(+DB.settings.monthlyFixedCosts||0)/(+DB.settings.estimatedMonthlyOrders||1):0;

function recipeCost(r,servings=1){
  const ing=r.items.reduce((s,it)=>{const i=DB.ingredients.find(x=>x.id===it.ingredientId);return s+(i?+i.cost*+it.quantity:0);},0);
  const labor=(+r.laborHours||0)*(+DB.settings.labor);
  const gastosFijosPerOrder=DB.gastosFijos.porOrden||getOverheadPerOrder();
  const total=ing+labor+gastosFijosPerOrder;
  const recServings=+r.servings||1;
  return (total/recServings)*servings;
}

function productIngCost(p){
  if(p.recipes&&p.recipes.length>0){return p.recipes.reduce((s,pr)=>{const r=DB.recipes.find(x=>x.id===pr.recipeId)||{items:[],laborHours:0,servings:1};const ing=r.items.reduce((a,it)=>{const i=DB.ingredients.find(x=>x.id===it.ingredientId);return a+(i?+i.cost*+it.quantity:0);},0);return s+(ing/(+r.servings||1))*(+pr.servings||1);},0);}
  const r=DB.recipes.find(x=>x.id===p.recipeId)||{items:[],laborHours:0,servings:1};
  const ing=r.items.reduce((a,it)=>{const i=DB.ingredients.find(x=>x.id===it.ingredientId);return a+(i?+i.cost*+it.quantity:0);},0);
  return (ing/(+r.servings||1))*(+p.quantity||1);
}
function productLaborCost(p){
  if(p.recipes&&p.recipes.length>0){return p.recipes.reduce((s,pr)=>{const r=DB.recipes.find(x=>x.id===pr.recipeId)||{items:[],laborHours:0,servings:1};return s+((+r.laborHours||0)*DB.settings.labor/(+r.servings||1))*(+pr.servings||1);},0);}
  const r=DB.recipes.find(x=>x.id===p.recipeId)||{items:[],laborHours:0,servings:1};
  return ((+r.laborHours||0)*DB.settings.labor/(+r.servings||1))*(+p.quantity||1);
}
function productCost(p){
  const gastosFijos=DB.gastosFijos.porOrden||getOverheadPerOrder();
  return productIngCost(p)+productLaborCost(p)+gastosFijos;
}

// Pricing (margin) is NOT decided on the Product anymore — a product is just its cost
// (Ingredientes + Mano de Obra + Gastos Fijos). The real selling price gets calculated
// on the ORDER, once Gastos Variables and Mano de Obra Adicional for that specific
// customer are known. That's the moment the item actually gets "priced."
function orderItemExtraRaw(it){
  const extraCost=+(it.extraCost||0);
  const extraLaborHours=+(it.extraLaborHours||0);
  const extraLaborCost=extraLaborHours*(+DB.settings.labor||0);
  return extraCost+extraLaborCost;
}
function orderItemCost(it){
  const p=DB.products.find(x=>x.id===it.productId);
  if(!p)return 0;
  return productCost(p)*(+it.quantity||1)+orderItemExtraRaw(it);
}
function orderItemMargin(it){
  return (it.margin!==null&&it.margin!==undefined&&it.margin!=="")?+it.margin:0;
}
function orderItemLineTotal(it){
  const cost=orderItemCost(it);
  return cost*(1+(orderItemMargin(it)/100));
}
// An item is taxable unless explicitly marked otherwise (it.taxable===false) —
// used for offers that already have tax baked into the quoted price.
function itemIsTaxable(it){return it.taxable!==false;}
function quoteTotals(items){
  const taxRate=+(DB.settings.taxRate||0);
  const subtotal=(items||[]).reduce((s,it)=>s+orderItemLineTotal(it),0);
  const taxableSubtotal=(items||[]).reduce((s,it)=>s+(itemIsTaxable(it)?orderItemLineTotal(it):0),0);
  const tax=taxableSubtotal*(taxRate/100);
  const grandTotal=subtotal+tax;
  return {subtotal,tax,grandTotal,taxRate};
}

function calcIngFromPackage(){
  const resultEl=document.getElementById("ing-calc-result");
  if(!resultEl)return;
  const name=val("m-name");
  const targetUnit=val("m-unit");
  const pkgAmount=+val("m-pkg-amount");
  const pkgUnit=val("m-pkg-unit");
  const pkgPrice=+val("m-pkg-price");
  const sym=getSym();
  const isEs=lang==="es";

  if(targetUnit==="unidad"||targetUnit==="paquete"){
    resultEl.innerHTML=`<div style="background:#fef3c7;border-radius:8px;padding:10px;font-size:12px;color:#92400e">${isEs
      ?"Esta unidad es por cantidad/conteo, no por peso o volumen — no se puede calcular automáticamente. Escribe el Costo por Unidad directamente abajo."
      :"This unit is count-based, not weight or volume — it can't be calculated automatically. Type the Cost per Unit directly below."}</div>`;
    return;
  }
  if(!pkgAmount||!pkgUnit||!pkgPrice){
    resultEl.innerHTML=`<div style="font-size:11px;color:#b09070">${isEs?"Completa el precio, la cantidad y la unidad de compra para calcular.":"Fill in the price, amount, and purchase unit to calculate."}</div>`;
    return;
  }
  const r=calcSmartCost(name,pkgAmount,pkgUnit,pkgPrice,targetUnit);
  if(!r.ok){
    if(r.reason==="unrecognized"){
      resultEl.innerHTML=`<div style="background:#fee2e2;border-radius:8px;padding:10px;font-size:12px;color:#b91c1c;line-height:1.6">
        ${isEs?"⚠️ No reconocemos este ingrediente para convertir entre peso y volumen.":"⚠️ We don't recognize this ingredient to convert between weight and volume."}
        <div style="margin-top:6px;color:#7a1212">${isEs
          ?`<strong>Cómo calcularlo tú misma:</strong> Costo por Unidad = Precio Pagado ÷ Cantidad que Rinde (en ${esc(unitDisplay(targetUnit))}). Mide cuánto rinde tu paquete en ${esc(unitDisplay(targetUnit))}, luego divide el precio entre esa cantidad y escribe el resultado en el campo Costo de abajo.`
          :`<strong>How to calculate it yourself:</strong> Cost per Unit = Price Paid ÷ Yield (in ${esc(unitDisplay(targetUnit))}). Measure how much your package yields in ${esc(unitDisplay(targetUnit))}, then divide the price by that amount and type the result into the Cost field below.`}</div>
      </div>`;
      return;
    }
    return; // incomplete - already handled above
  }
  document.getElementById("m-cost").value=r.costPerUnit.toFixed(4);
  resultEl.innerHTML=`<div style="background:#dcfce7;border-radius:8px;padding:10px;font-size:12px;color:#166534;line-height:1.6">
    ${r.usedDensity
      ?(isEs?`✓ Reconocido como <strong>${esc(r.densityLabel)}</strong> (estimado por densidad típica — ajusta si tu producto es diferente)`:`✓ Recognized as <strong>${esc(r.densityLabel)}</strong> (estimated by typical density — adjust if your product differs)`)
      :(isEs?"✓ Conversión directa de unidades":"✓ Direct unit conversion")}
    <div style="margin-top:4px;font-weight:700">${isEs?"Rinde":"Yields"} ~${r.yieldInTarget.toFixed(2)} ${esc(unitDisplay(targetUnit))} → ${fmt(sym,r.costPerUnit)} ${isEs?"por":"per"} ${esc(unitDisplay(targetUnit))}</div>
  </div>`;
}

function addRecItem(){
  const ingId=val("m-ing-sel");const qty=+val("m-ing-qty");

  const ex=recItems.findIndex(i=>i.ingredientId===ingId);

  const r={name:val("m-name"),description:val("m-desc"),servings:+val("m-serv"),laborHours:+val("m-labor"),instructions:val("m-inst"),items:recItems};
  document.getElementById("modal-body").innerHTML=buildRecForm(r,editingRecId);
}
function removeRecItem(idx){
  recItems.splice(idx,1);
  const r={name:val("m-name"),description:val("m-desc"),servings:+val("m-serv"),laborHours:+val("m-labor"),instructions:val("m-inst"),items:recItems};

async function saveRec(){

function rerenderProdForm(p,recipes){
  const active=document.activeElement;
  const activeId=active&&active.id;
  const selStart=active&&typeof active.selectionStart==="number"?active.selectionStart:null;
  const selEnd=active&&typeof active.selectionEnd==="number"?active.selectionEnd:null;
  document.getElementById("modal-body").innerHTML=buildProdForm(p,recipes);
  if(activeId){
    const el=document.getElementById(activeId);
    if(el){
      el.focus();
      if(selStart!==null&&el.setSelectionRange){
        try{el.setSelectionRange(selStart,selEnd);}catch(e){}
      }
    }
  }

async function saveProd(){
  const name=val("m-name");if(!name)return;
  const recipes=getProdRecipes();
  if(recipes.length===0){alert(lang==="es"?"Agrega al menos una receta.":"Add at least one recipe.");return;}
  const overheadPerOrder=DB.gastosFijos.porOrden||getOverheadPerOrder();
  const ingredientsSum=recipes.reduce((s,pr)=>{const r=DB.recipes.find(x=>x.id===pr.recipeId)||{items:[],servings:1};const ing=r.items.reduce((a,it)=>{const i=DB.ingredients.find(x=>x.id===it.ingredientId);return a+(i?+i.cost*+it.quantity:0);},0);return s+(ing/(+r.servings||1))*(+pr.servings||1);},0);
  const recipeLaborSum=recipes.reduce((s,pr)=>{const r=DB.recipes.find(x=>x.id===pr.recipeId)||{items:[],laborHours:0,servings:1};return s+((+r.laborHours||0)*DB.settings.labor/(+r.servings||1))*(+pr.servings||1);},0);
  const cost=ingredientsSum+overheadPerOrder+recipeLaborSum;
  const firstRec=recipes[0];
  const realId=editingProdId&&editingProdId.length>0?editingProdId:uid();
  const obj={id:realId,name,description:val("m-desc"),recipeId:firstRec.recipeId,quantity:firstRec.servings,overheadPerOrder,cost,recipes:[...recipes]};
  if(editingProdId&&editingProdId.length>0){DB.products=DB.products.map(p=>p.id===editingProdId?obj:p);}else{DB.products.push(obj);}

function updateOrdItemPreview(){
  const preview=document.getElementById("m-item-preview");
  if(!preview)return;
  const pid=val("m-prod-sel");
  const p=DB.products.find(x=>x.id===pid);
  if(!p){preview.innerHTML="";return;}
  const qty=+val("m-prod-qty")||1;
  const extraCost=+val("m-item-extra")||0;
  const extraLaborHours=+val("m-item-decoration")||0;
  const marginVal=val("m-item-margin");
  const margin=marginVal===""?0:+marginVal;
  const cost=productCost(p)*qty+extraCost+extraLaborHours*(+DB.settings.labor||0);
  const total=cost*(1+margin/100);
  const sym=getSym();
  preview.innerHTML=`${lang==="es"?"Costo":"Cost"} ${fmt(sym,cost)} → ${fmt(sym,total)}${marginVal===""?(lang==="es"?" (sin margen aún)":" (no margin yet)"):""}`;
}

function buildOrdStateObj(id){
  return {clientId:val("m-cli"),date:val("m-date"),deliveryDate:val("m-delivery"),status:val("m-status"),notes:val("m-notes"),items:ordItems,deliveryMethod:val("m-delivery-method"),contractSent:document.getElementById("m-contract-sent")?.checked,finalPrice:val("m-final-price")?+val("m-final-price"):null};
}

function toggleOrdItemTaxable(idx){
  const it=ordItems[idx];
  if(!it)return;
  ordItems[idx]={...it,taxable:!itemIsTaxable(it)};
  const state=buildOrdStateObj(editingOrdId);
  state.finalPrice=null; // tax total changed — an old manual round no longer applies
  document.getElementById("modal-body").innerHTML=buildOrdForm(state,editingOrdId);
}

function editOrdItem(idx){
  const it=ordItems[idx];
  if(!it)return;
  ordEditingItemIdx=idx;
  document.getElementById("modal-body").innerHTML=buildOrdForm(buildOrdStateObj(editingOrdId),editingOrdId);
  document.getElementById("m-prod-sel").value=it.productId;
  document.getElementById("m-prod-qty").value=it.quantity;
  document.getElementById("m-item-extra").value=it.extraCost||"";
  document.getElementById("m-item-decoration").value=it.extraLaborHours||"";
  document.getElementById("m-item-margin").value=(it.margin===null||it.margin===undefined)?"":it.margin;
  document.getElementById("m-item-taxable").checked=itemIsTaxable(it);
  updateOrdItemPreview();
  document.getElementById("m-item-margin").focus();
}

function cancelEditOrdItem(){
  ordEditingItemIdx=-1;
  document.getElementById("modal-body").innerHTML=buildOrdForm(buildOrdStateObj(editingOrdId),editingOrdId);
}

function addOrdItem(){
  const pid=val("m-prod-sel");const qty=+val("m-prod-qty")||1;if(!pid)return;
  const extraCost=+val("m-item-extra")||0;
  const extraLaborHours=+val("m-item-decoration")||0;
  const marginVal=val("m-item-margin");
  const margin=marginVal===""?null:+marginVal;
  const taxable=document.getElementById("m-item-taxable")?.checked!==false;
  const newItem={productId:pid,quantity:qty,extraCost,extraLaborHours,margin,taxable};
  if(ordEditingItemIdx>=0&&ordEditingItemIdx<ordItems.length){ordItems[ordEditingItemIdx]=newItem;ordEditingItemIdx=-1;}
  else{ordItems.push(newItem);}
  const state=buildOrdStateObj(editingOrdId);
  state.finalPrice=null; // the item list changed — an old manual round no longer applies
  document.getElementById("modal-body").innerHTML=buildOrdForm(state,editingOrdId);
}
function removeOrdItem(idx){
  ordItems.splice(idx,1);
  ordEditingItemIdx=-1;
  const state=buildOrdStateObj(editingOrdId);
  state.finalPrice=null;
  document.getElementById("modal-body").innerHTML=buildOrdForm(state,editingOrdId);
}
function addOrdPayment(){
  const date=val("m-pay-date");
  const amount=+val("m-pay-amount");
  const method=val("m-pay-method");
  if(!amount)return;
  ordPayments.push({date:date||new Date().toISOString().slice(0,10),amount,method:method||"—"});
  const o={clientId:val("m-cli"),date:val("m-date"),deliveryDate:val("m-delivery"),status:val("m-status"),notes:val("m-notes"),items:ordItems,deliveryMethod:val("m-delivery-method"),contractSent:document.getElementById("m-contract-sent")?.checked,finalPrice:val("m-final-price")?+val("m-final-price"):null};
  document.getElementById("modal-body").innerHTML=buildOrdForm(o,editingOrdId);
}
function removeOrdPayment(idx){
  ordPayments.splice(idx,1);
  const o={clientId:val("m-cli"),date:val("m-date"),deliveryDate:val("m-delivery"),status:val("m-status"),notes:val("m-notes"),items:ordItems,deliveryMethod:val("m-delivery-method"),contractSent:document.getElementById("m-contract-sent")?.checked,finalPrice:val("m-final-price")?+val("m-final-price"):null};
  document.getElementById("modal-body").innerHTML=buildOrdForm(o,editingOrdId);

async function saveOrd(id){
  // If the person is mid-edit on an existing item (pencil open, fields changed)
  // but jumps straight to Guardar without clicking "Actualizar Producto" first,
  // commit that edit now instead of silently discarding it.
  if(ordEditingItemIdx>=0&&ordEditingItemIdx<ordItems.length){
    const pid=val("m-prod-sel");
    if(pid){
      const extraCost=+val("m-item-extra")||0;
      const extraLaborHours=+val("m-item-decoration")||0;
      const marginVal=val("m-item-margin");
      const margin=marginVal===""?null:+marginVal;
      const taxable=document.getElementById("m-item-taxable")?.checked!==false;
      ordItems[ordEditingItemIdx]={productId:pid,quantity:+val("m-prod-qty")||1,extraCost,extraLaborHours,margin,taxable};
    }
    ordEditingItemIdx=-1;
  }
  const calculated=quoteTotals(ordItems).grandTotal;
  const finalPrice=val("m-final-price")?+val("m-final-price"):null;
  const total=finalPrice&&finalPrice>0?finalPrice:calculated;
  const obj={id:id||uid(),clientId:val("m-cli"),date:val("m-date"),deliveryDate:val("m-delivery"),status:val("m-status"),notes:val("m-notes"),items:[...ordItems],total,payments:[...ordPayments],createdAt:new Date().toISOString(),deliveryMethod:val("m-delivery-method"),contractSent:document.getElementById("m-contract-sent")?.checked||false,finalPrice};
  if(id){DB.orders=DB.orders.map(o=>o.id===id?obj:o);}else{DB.orders.push(obj);}
  await saveOrd_cloud(obj);closeModal();renderOrders();renderNav();
}
async function delOrd(id){
  const L=TRANSLATIONS[lang];
  if(!confirm(L.ordDeleteConfirm))return;
  DB.orders=DB.orders.filter(o=>o.id!==id);await delOrd_cloud(id);renderOrders();renderNav();
}

// ── COTIZACIONES (QUOTES) ────────────────────────────────────────────────────
// A Quote is where Margen de Ganancia actually lives day-to-day: pick a product,
// optionally add Gastos Variables / Horas Adicionales for this specific job, type
// in a margin (blank by default — nothing is assumed), and see the price update
// live. Once it looks right, convert it straight into an Orden with one click.
function renderQuotes(){
  const L=TRANSLATIONS[lang]; const sym=getSym();
  let filt=quoFilter==="todas"?DB.quotes:DB.quotes.filter(q=>q.status===quoFilter);
  if(quoSearch)filt=filt.filter(q=>{const c=DB.clients.find(x=>x.id===q.clientId);return c?.name.toLowerCase().includes(quoSearch.toLowerCase());});
  const sorted=[...filt].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const filterLabels={pendiente:L.quoStatusPendiente,convertida:L.quoStatusLabels.convertida,rechazada:L.quoStatusRechazada};
  document.getElementById("page-quotes").innerHTML=`
    <div class="page-header"><h2>${L.quoTitle}</h2>${btnHtml(L.quoAddBtn,"openQuoteModal()","primary")}</div>
    <div class="filter-bar">
      ${["todas","pendiente","convertida","rechazada"].map(s=>`<button class="filter-btn${s===quoFilter?" active":""}" onclick="setQuoFilter('${s}')">${s==="todas"?L.quoFilterAll:filterLabels[s]}</button>`).join("")}
      <input class="input-field" placeholder="${L.quoSearchPlaceholder}" value="${esc(quoSearch)}" oninput="setQuoSearch(this.value)" style="max-width:160px"/>
    </div>
    ${sorted.map(q=>{
      const cl=DB.clients.find(c=>c.id===q.clientId);
      const calculated=(q.items||[]).reduce((s,it)=>s+orderItemLineTotal(it),0);
      const total=q.finalPrice&&q.finalPrice>0?q.finalPrice:calculated;
      return `
      <div class="order-card">
        <div style="flex:1;min-width:160px">
          <div style="font-weight:700;font-size:14px;color:#3a1800">${esc(cl?.name||L.quoNoClient)}</div>
          <div style="font-size:11px;color:#a07850">${esc(q.date)}</div>
          <div style="font-size:11px;color:#9a7050">${(q.items||[]).map(it=>{const p=DB.products.find(x=>x.id===it.productId);return p?esc(p.name)+" x"+it.quantity:"";}).filter(Boolean).join(", ")}</div>
          ${q.notes?`<div style="font-size:11px;color:#b09070;font-style:italic">${esc(q.notes)}</div>`:""}
          ${q.status==="convertida"?`<div style="font-size:11px;color:#166534;font-weight:700">${L.quoConvertedBadge}</div>`:""}
          ${q.status==="rechazada"?`<div style="font-size:11px;color:#b91c1c;font-weight:700">${L.quoRejectedBadge(q.declineReason)}</div>`:""}
        </div>
        <div class="flex-row">
          <div style="font-weight:800;font-size:15px">${fmt(sym,total)}</div>
          ${q.status==="pendiente"?`<button class="btn btn-success btn-sm" onclick="convertQuoteToOrder('${q.id}')" style="white-space:nowrap">${L.quoConvertBtn}</button>`:""}
          <button class="icon-btn" style="color:#7a3f10" onclick="openQuoteModal('${q.id}')">✏️</button>
          <button class="icon-btn" style="color:#b91c1c" onclick="delQuote('${q.id}')">🗑️</button>
        </div>
      </div>`;}).join("")}
    ${sorted.length===0?`<p style="color:#b09070">${L.quoEmpty}</p>`:""}`;
}

function toggleQuoteItemTaxable(idx){

// Reads the currently open Cotización form (if any) into a full quote object,
// auto-committing any item that's mid-edit (pencil open) but never confirmed
// with "Actualizar Producto". Used by both Guardar and Convertir en Orden so
// neither one can silently drop an unsaved change.
function buildQuoteObjFromForm(id){
  if(quoEditingItemIdx>=0&&quoEditingItemIdx<quoItems.length){
    const pid=val("q-prod-sel");
    if(pid){
      const extraCost=+val("q-item-extra")||0;
      const extraLaborHours=+val("q-item-decoration")||0;
      const marginVal=val("q-item-margin");
      const margin=marginVal===""?null:+marginVal;
      const taxable=document.getElementById("q-item-taxable")?.checked!==false;
      quoItems[quoEditingItemIdx]={productId:pid,quantity:+val("q-prod-qty")||1,extraCost,extraLaborHours,margin,taxable};
    }
    quoEditingItemIdx=-1;
  }
  const q=DB.quotes.find(x=>x.id===id)||{};
  const statusEl=document.getElementById("q-status");
  const status=q.status==="convertida"?"convertida":(statusEl?statusEl.value:"pendiente");
  const declineReason=status==="rechazada"?val("q-decline-reason"):"";
  return {id:id||uid(),clientId:val("q-cli"),date:val("q-date"),deliveryDate:val("q-delivery"),notes:val("q-notes"),items:[...quoItems],finalPrice:val("q-final-price")?+val("q-final-price"):null,createdAt:q.createdAt||new Date().toISOString(),status,orderId:q.orderId||null,declineReason};
}

async function saveQuote(id){
  const obj=buildQuoteObjFromForm(id);
  if(id){DB.quotes=DB.quotes.map(x=>x.id===id?obj:x);}else{DB.quotes.push(obj);}
  await saveQuo_cloud(obj);closeModal();renderQuotes();renderNav();
}

async function delQuote(id){
  const L=TRANSLATIONS[lang];
  if(!confirm(L.quoDeleteConfirm))return;
  DB.quotes=DB.quotes.filter(q=>q.id!==id);await delQuo_cloud(id);renderQuotes();renderNav();
}

async function convertQuoteToOrder(id){
  const L=TRANSLATIONS[lang];
  // If the edit modal for this exact quote is open, commit whatever's on
  // screen (including an item mid-edit) before converting — otherwise this
  // would silently convert the stale last-saved version instead.
  const modalIsOpenForThisQuote=editingQuoId===id&&document.getElementById("q-cli");
  let q=DB.quotes.find(x=>x.id===id);
  if(!q)return;
  if(!confirm(L.quoConvertConfirm))return;
  if(modalIsOpenForThisQuote){
    q=buildQuoteObjFromForm(id);
    DB.quotes=DB.quotes.map(x=>x.id===id?q:x);
    await saveQuo_cloud(q);
  }
  const totals=quoteTotals(q.items||[]);
  const total=q.finalPrice&&q.finalPrice>0?q.finalPrice:totals.grandTotal;
  const today=new Date().toISOString().slice(0,10);
  const newOrder={id:uid(),clientId:q.clientId,date:today,deliveryDate:q.deliveryDate||null,status:"en proceso",notes:q.notes,items:[...q.items],total,payments:[],createdAt:new Date().toISOString(),deliveryMethod:"",contractSent:false,finalPrice:q.finalPrice||null};
  DB.orders.push(newOrder);
  const orderOk=await saveOrd_cloud(newOrder);
  if(!orderOk){
    DB.orders=DB.orders.filter(o=>o.id!==newOrder.id); // roll back — the order never actually saved
    return;
  }
  const updatedQuote={...q,status:"convertida",orderId:newOrder.id};
  DB.quotes=DB.quotes.map(x=>x.id===id?updatedQuote:x);
  await saveQuo_cloud(updatedQuote);
  closeModal();
  renderQuotes();renderNav();
  alert(L.quoConvertedMsg);
}

function calcGFTotals(){
  const HOURS=730;
  const cat1=[
    {bill:gfVal("gf-renta"),hours:gfVal("gf-h-renta")},
    {bill:gfVal("gf-elec"),hours:gfVal("gf-h-elec")},
    {bill:gfVal("gf-agua"),hours:gfVal("gf-h-agua")},
    {bill:gfVal("gf-gas"),hours:gfVal("gf-h-gas")},
    {bill:gfVal("gf-wifi"),hours:gfVal("gf-h-wifi")},
    {bill:gfVal("gf-celular"),hours:gfVal("gf-h-celular")},
  ];
  const sub1=cat1.reduce((s,r)=>s+((r.bill/HOURS)*r.hours),0);
  const sub2=gfVal("gf-gasolina")+gfVal("gf-peajes")+gfVal("gf-limpieza")+gfVal("gf-bolsas")+gfVal("gf-otro1")+gfVal("gf-otro2");
  const total=sub1+sub2;
  const ordenes=gfVal("gf-ordenes");
  const porOrden=ordenes>0?total/ordenes:0;
  const sym=getSym();
  const s1El=document.getElementById("gf-sub1-display");
  const s2El=document.getElementById("gf-sub2-display");
  const totEl=document.getElementById("gf-total-display");
  const porEl=document.getElementById("gf-por-order-display");
  if(s1El)s1El.textContent=fmt(sym,sub1);
  if(s2El)s2El.textContent=fmt(sym,sub2);
  if(totEl)totEl.textContent=fmt(sym,total);
  if(porEl){porEl.textContent=fmt(sym,porOrden);porEl.style.color=porOrden>0?"#166534":"#b91c1c";}
  cat1.forEach((r,i)=>{
    const el=document.getElementById(["gf-ph-renta","gf-ph-elec","gf-ph-agua","gf-ph-gas","gf-ph-wifi","gf-ph-celular"][i]);
    if(el)el.textContent=r.bill>0?fmt(sym,r.bill/HOURS):"—";
    const tot=document.getElementById(["gf-tot-renta","gf-tot-elec","gf-tot-agua","gf-tot-gas","gf-tot-wifi","gf-tot-celular"][i]);
    if(tot)tot.textContent=r.bill>0?fmt(sym,(r.bill/HOURS)*r.hours):"—";
  });
}

// ── TOOLTIP SYSTEM ────────────────────────────────────────────────────────────
let activeTooltip = null;
function showTooltip(el, text) {
  hideTooltip();
  const tip = document.createElement('div');
  tip.className = 'tooltip-popup show';
  tip.id = 'active-tooltip';
  tip.textContent = text;
  document.body.appendChild(tip);
  const rect = el.getBoundingClientRect();
  let top = rect.bottom + 8;
  let left = rect.left;
  if (left + 260 > window.innerWidth) left = window.innerWidth - 270;
  if (top + 120 > window.innerHeight) top = rect.top - 130;
  tip.style.top = top + 'px';
  tip.style.left = left + 'px';
  activeTooltip = tip;
  setTimeout(() => document.addEventListener('click', hideTooltip, {once:true}), 10);
}
function hideTooltip() {
  const t = document.getElementById('active-tooltip');
  if (t) t.remove();
  activeTooltip = null;
}
function tip(text) {
  const safe = text.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
  return `<button class="tooltip-btn" onclick="event.stopPropagation();showTooltip(this,'${safe}')">❓</button>`;
}

function setExpFilter(f){expFilter=f;renderExpenses();}
function openExpModal(id=""){
  const L=TRANSLATIONS[lang];
  const e=DB.expenses.find(x=>x.id===id)||{};
  const today=new Date().toISOString().slice(0,10);
  openModal(id?L.expModalEdit:L.expModalNew,`
    <div class="grid2">
      ${fieldHtml(L.expLblDate,`<input class="input-field" id="m-date" type="date" value="${esc(e.date||today)}"/>`)}
      ${fieldHtml(L.expLblCategory,`<select class="input-field" id="m-cat">${EXPENSE_CATS.map((c,i)=>`<option value="${c}"${c===e.category?" selected":""}>${expCatDisplay(c)}</option>`).join("")}</select>`)}
    </div>
    ${fieldHtml(L.expLblDesc,`<input class="input-field" id="m-desc" value="${esc(e.description||"")}" placeholder="${L.expDescPlaceholder}"/>`)}
    ${fieldHtml(L.expLblAmount,`<input class="input-field" id="m-amount" type="number" value="${e.amount||""}" placeholder="0.00"/>`)}
    <div class="modal-footer">
      ${btnHtml(L.btnCancel,"closeModal()","secondary")}
      ${btnHtml(L.btnSave,"saveExp('"+id+"')","primary")}
    </div>`);
}
async function saveExp(id){
  const amount=+val("m-amount");if(!amount)return;
  const obj={id:id||uid(),date:val("m-date"),category:val("m-cat"),description:val("m-desc"),amount};
  if(id){DB.expenses=DB.expenses.map(e=>e.id===id?obj:e);}else{DB.expenses.push(obj);}
  await saveExp_cloud(obj);closeModal();renderExpenses();
}
async function delExp(id){
  const L=TRANSLATIONS[lang];
  if(!confirm(L.expDeleteConfirm))return;
  DB.expenses=DB.expenses.filter(e=>e.id!==id);await delExp_cloud(id);renderExpenses();
}

let repRange="todo";
function renderReports(){
  const L=TRANSLATIONS[lang]; const sym=getSym();

  const fo=DB.orders.filter(o=>inR(o.date));
  const fe=DB.expenses.filter(e=>inR(e.date));
  const rev=fo.filter(o=>o.status==="completada").reduce((s,o)=>s+(+o.total),0);
  const exp=fe.reduce((s,e)=>s+(+e.amount),0);
  const cc=fo.filter(o=>o.status==="completada").length;
  const avg=cc?rev/cc:0;
  const cR={};fo.filter(o=>o.status==="completada").forEach(o=>{cR[o.clientId]=(cR[o.clientId]||0)+(+o.total);});
  const topC=Object.entries(cR).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,v])=>({name:DB.clients.find(c=>c.id===id)?.name||"?",value:+v.toFixed(2)}));
  const pS={};fo.filter(o=>o.status==="completada").forEach(o=>o.items.forEach(it=>{pS[it.productId]=(pS[it.productId]||0)+it.quantity;}));

  const monthlyFixed=+DB.settings.monthlyFixedCosts||0;

  const overheadPct=monthlyFixed>0?Math.min((overheadCovered/monthlyFixed)*100,100).toFixed(0):100;

          <div style="font-weight:800;font-size:16px;color:#2a1200">${fmt(sym,monthlyFixed)}</div>
        </div>
        <div style="background:#fdf0e3;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:10px;color:#9a7050">${lang==="es"?"Órdenes Este Mes":"Orders This Month"}</div>
          <div style="font-weight:800;font-size:16px;color:#2a1200">${ordersThisMonth} / ${estOrders}</div>
        </div>
        <div style="background:#fdf0e3;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:10px;color:#9a7050">${lang==="es"?"Cubierto":"Covered"}</div>
          <div style="font-weight:800;font-size:16px;color:${+overheadPct>=100?"#166534":"#d97706"}">${fmt(sym,overheadCovered)}</div>
        </div>
        <div style="background:#fdf0e3;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:10px;color:#9a7050">${lang==="es"?"Por Cubrir":"Remaining"}</div>
          <div style="font-weight:800;font-size:16px;color:${overheadRemaining===0?"#166534":"#b91c1c"}">${fmt(sym,overheadRemaining)}</div>
        </div>
      </div>
      <div style="background:#f0e4d0;border-radius:20px;height:12px;overflow:hidden">
        <div style="background:${+overheadPct>=100?"#166534":"#d97706"};height:100%;width:${overheadPct}%;border-radius:20px;transition:width 0.5s"></div>

      <div style="font-size:12px;color:#7a5030;margin-top:8px;font-weight:600">
        ${+overheadPct>=100
          ? (lang==="es"?"✅ ¡Gastos fijos completamente cubiertos este mes!":"✅ Fixed costs fully covered this month!")

      </div>
    </div>`:""}

        <div style="font-weight:700;font-size:14px;color:#5a2e0a;margin-bottom:8px">${L.setFormulaSection}</div>
        <div style="background:#f5e6d3;border-radius:10px;padding:12px;font-size:13px;color:#4a2000;line-height:1.9">
          <strong>${lang==="es"?"Costo =":"Cost ="}</strong> ${lang==="es"?"Ingredientes":"Ingredients"} + ${lang==="es"?"Gastos Fijos":"Fixed Costs"} + ${lang==="es"?"Gastos Variables":"Variable Costs"} + (${lang==="es"?"Horas":"Hours"}×${sym}${DB.settings.labor}) &nbsp;·&nbsp; <strong>${lang==="es"?"Precio =":"Price ="}</strong> ${lang==="es"?"Costo":"Cost"} × (1 + ${lang==="es"?"Margen%":"Margin%"}) &nbsp;·&nbsp; <strong>${lang==="es"?"+ Impuesto":"+ Tax"}</strong> ${lang==="es"?"sobre productos sujetos a impuesto":"on taxable products"}
        </div>
      </div>
      <div class="flex-row">
        <button class="btn btn-primary" onclick="saveSettings()">${L.setSaveBtn}</button>
        <button class="btn btn-success btn-sm" onclick="exportExcel()">${L.setExportBtn}</button>
        <span id="saved-msg" style="color:#166534;font-size:13px;font-weight:700;display:none">${L.setSavedMsg}</span>
      </div>
    </div>`;
}

async function saveSettings(){
  DB.settings={...DB.settings,labor:+val("s-labor"),overhead:0,currency:val("s-currency"),taxRate:+val("s-tax")||0};
  await saveSettings_cloud(DB.settings);
  renderSettings();
  const msg=document.getElementById("saved-msg");
  if(msg){msg.style.display="inline";setTimeout(()=>msg.style.display="none",2200);}
  renderNav();
}

// ── EXCEL EXPORT ──────────────────────────────────────────────────────────────
function exportExcel(){
  const sym=getSym();
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Ingrediente","Unidad","Costo","Stock","Mín","Estado"],...DB.ingredients.map(i=>[i.name,i.unit,+i.cost,+i.quantity,+i.minStock,+i.quantity<=+i.minStock?"BAJO":"OK"])]),"Ingredientes");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Producto","Receta","Costo Total"],...DB.products.map(p=>[p.name,DB.recipes.find(r=>r.id===p.recipeId)?.name||"",+p.cost])]),"Productos");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Fecha","Cliente","Estado","Total","Productos"],...DB.orders.map(o=>[o.date,DB.clients.find(c=>c.id===o.clientId)?.name||"—",o.status,+o.total,o.items.map(it=>`${DB.products.find(p=>p.id===it.productId)?.name||"?"} x${it.quantity}`).join(", ")])]),"Órdenes");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Fecha","Categoría","Descripción","Monto"],...DB.expenses.map(e=>[e.date,e.category,e.description,+e.amount])]),"Gastos");
  const rev=DB.orders.filter(o=>o.status==="completada").reduce((s,o)=>s+(+o.total),0);
  const exp=DB.expenses.reduce((s,e)=>s+(+e.amount),0);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Resumen"],[],["Ingresos",rev],["Gastos",exp],["Utilidad",rev-exp],[],["Moneda",DB.settings.currency]]),"Resumen");
  XLSX.writeFile(wb,`MyBakingPro_${new Date().toISOString().slice(0,10)}.xlsx`);
}
