async function doSignup() {
  const L = TRANSLATIONS[lang];
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const confirm = document.getElementById('signup-confirm').value;
  if (!email || !password) return showAuthError(L.errFillAll);
  if (password.length < 6) return showAuthError(L.errPassLength);
  if (password !== confirm) return showAuthError(L.errPassMatch);
  const btn = document.getElementById('signup-btn');

  if (error) return showAuthError(L.errSignupPrefix + error.message);
  showAuthSuccess(L.successSignup);
}

async function loadFromCloud(){
  if(!currentUser)return;
  const uid=currentUser.id;
  const [ing,rec,prod,ord,cli,exp,set,gf]=await Promise.all([
    _supabase.from("mbp_ingredients").select("*").eq("user_id",uid),
    _supabase.from("mbp_recipes").select("*").eq("user_id",uid),
    _supabase.from("mbp_products").select("*").eq("user_id",uid),
    _supabase.from("mbp_orders").select("*").eq("user_id",uid),
    _supabase.from("mbp_clients").select("*").eq("user_id",uid),
    _supabase.from("mbp_expenses").select("*").eq("user_id",uid),
    _supabase.from("mbp_settings").select("*").eq("user_id",uid).single(),
    _supabase.from("mbp_gastos_fijos").select("*").eq("user_id",uid).order("created_at",{ascending:false}).limit(1),
  ]);
  DB.ingredients=(ing.data||[]).map(r=>({id:r.id,name:r.name,unit:r.unit,cost:r.cost,quantity:r.quantity,minStock:r.min_stock}));
  DB.recipes=(rec.data||[]).map(r=>({id:r.id,name:r.name,description:r.description,servings:r.servings,laborHours:r.labor_hours,instructions:r.instructions,items:r.items||[]}));
  DB.products=(prod.data||[]).map(r=>({id:r.id,name:r.name,description:r.description,recipeId:r.recipe_id,quantity:r.quantity,extraCost:r.extra_cost,overheadPerOrder:r.overhead_per_order||0,price:r.price,cost:r.cost,recipes:r.recipes||[]}));

// ── COST HELPERS ───────────────────────────────────────────────────────────────
const getOverheadPerOrder=()=>DB.settings.estimatedMonthlyOrders>0?(+DB.settings.monthlyFixedCosts||0)/(+DB.settings.estimatedMonthlyOrders||1):0;

function recipeCost(r,servings=1){
  const ing=r.items.reduce((s,it)=>{const i=DB.ingredients.find(x=>x.id===it.ingredientId);return s+(i?+i.cost*+it.quantity:0);},0);
  // 3 of 4 points: Ingredientes + Mano de Obra + Gastos Fijos por Orden
  const labor=(+r.laborHours||0)*(+DB.settings.labor);
  const gastosFijosPerOrder=DB.gastosFijos.porOrden||getOverheadPerOrder();
  const total=ing+labor+gastosFijosPerOrder;
  const recServings=+r.servings||1;
  return (total/recServings)*servings;
}

function productIngCost(p){
  if(p.recipes&&p.recipes.length>0){return p.recipes.reduce((s,pr)=>{const r=DB.recipes.find(x=>x.id===pr.recipeId)||{items:[],laborHours:0,servings:1};const ing=r.items.reduce((a,it)=>{const i=DB.ingredients.find(x=>x.id===it.ingredientId);return a+(i?+i.cost*+it.quantity:0);},0);return s+(ing/(+r.servings||1))*(+pr.servings||1);},0);}
  const r=DB.recipes.find(x=>x.id===p.recipeId)||{items:[],laborHours:0,servings:1};
  const ing=r.items.reduce((a,it)=>{const i=DB.ingredients.find(x=>x.id===it.ingredientId);return a+(i?+i.cost*+it.quantity:0);},0);
  return (ing/(+r.servings||1))*(+p.quantity||1);
}
function productLaborCost(p){
  if(p.recipes&&p.recipes.length>0){return p.recipes.reduce((s,pr)=>{const r=DB.recipes.find(x=>x.id===pr.recipeId)||{items:[],laborHours:0,servings:1};return s+((+r.laborHours||0)*DB.settings.labor/(+r.servings||1))*(+pr.servings||1);},0);}
  const r=DB.recipes.find(x=>x.id===p.recipeId)||{items:[],laborHours:0,servings:1};
  return ((+r.laborHours||0)*DB.settings.labor/(+r.servings||1))*(+p.quantity||1);
}
function productCost(p){
  // 4 Points: Ingredientes + Mano de Obra + Gastos Fijos + Gastos Variables
  const gastosFijos=DB.gastosFijos.porOrden||getOverheadPerOrder();
  return productIngCost(p)+productLaborCost(p)+gastosFijos+(+p.extraCost||0);
}
function productPrice(p){return (p.price!==null&&p.price!==undefined&&p.price!==""&&+p.price>0)?+p.price:productCost(p)*(1+(+DB.settings.margin/100));}

function gfVal(id){return parseFloat(document.getElementById(id)?.value)||0;}
function gfStr(id){return document.getElementById(id)?.value||"";}

function calcGFTotals(){
  const HOURS=730;
  const cat1=[
    {bill:gfVal("gf-renta"),hours:gfVal("gf-h-renta")},
    {bill:gfVal("gf-elec"),hours:gfVal("gf-h-elec")},
    {bill:gfVal("gf-agua"),hours:gfVal("gf-h-agua")},
    {bill:gfVal("gf-gas"),hours:gfVal("gf-h-gas")},
    {bill:gfVal("gf-wifi"),hours:gfVal("gf-h-wifi")},
    {bill:gfVal("gf-celular"),hours:gfVal("gf-h-celular")},
  ];
  const sub1=cat1.reduce((s,r)=>s+((r.bill/HOURS)*r.hours),0);
  const sub2=gfVal("gf-gasolina")+gfVal("gf-peajes")+gfVal("gf-limpieza")+gfVal("gf-bolsas")+gfVal("gf-otro1")+gfVal("gf-otro2");
  const total=sub1+sub2;
  const ordenes=gfVal("gf-ordenes");
  const porOrden=ordenes>0?total/ordenes:0;
  // update display
  const sym=getSym();
  const s1El=document.getElementById("gf-sub1-display");
  const s2El=document.getElementById("gf-sub2-display");
  const totEl=document.getElementById("gf-total-display");
  const porEl=document.getElementById("gf-por-order-display");
  if(s1El)s1El.textContent=fmt(sym,sub1);
  if(s2El)s2El.textContent=fmt(sym,sub2);
  if(totEl)totEl.textContent=fmt(sym,total);
  if(porEl){porEl.textContent=fmt(sym,porOrden);porEl.style.color=porOrden>0?"#166534":"#b91c1c";}
  // update perHour cells
  cat1.forEach((r,i)=>{
    const el=document.getElementById(["gf-ph-renta","gf-ph-elec","gf-ph-agua","gf-ph-gas","gf-ph-wifi","gf-ph-celular"][i]);
    if(el)el.textContent=r.bill>0?fmt(sym,r.bill/HOURS):"—";
    const tot=document.getElementById(["gf-tot-renta","gf-tot-elec","gf-tot-agua","gf-tot-gas","gf-tot-wifi","gf-tot-celular"][i]);
    if(tot)tot.textContent=r.bill>0?fmt(sym,(r.bill/HOURS)*r.hours):"—";
  });
}

function renderGastosFijos(){
  const L=TRANSLATIONS[lang]; const sym=getSym();
  const gf=DB.gastosFijos;
  const now=new Date();
  const months=lang==="es"
    ?["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"]
    :["January","February","March","April","May","June","July","August","September","October","November","December"];
  const monthOpts=months.map((m,i)=>`<option value="${i+1}"${(gf.month||now.getMonth()+1)===(i+1)?" selected":""}>${m}</option>`).join("");
  const yearOpts=[now.getFullYear()-1,now.getFullYear(),now.getFullYear()+1].map(y=>`<option value="${y}"${(gf.year||now.getFullYear())===y?" selected":""}>${y}</option>`).join("");

  const cat1Rows=[
    {id:"renta",label:L.gfRenta,bill:gf.renta,hours:gf.horasRenta},
    {id:"elec",label:L.gfElec,bill:gf.elec,hours:gf.horasElec},
    {id:"agua",label:L.gfAgua,bill:gf.agua,hours:gf.horasAgua},
    {id:"gas",label:L.gfGas,bill:gf.gas,hours:gf.horasGas},
    {id:"wifi",label:L.gfWifi,bill:gf.wifi,hours:gf.horasWifi},
    {id:"celular",label:L.gfCelular,bill:gf.celular,hours:gf.horasCelular},
  ];

async function saveGastosFijos(){
  const HOURS=730;
  const cat1=[
    {bill:gfVal("gf-renta"),hours:gfVal("gf-h-renta")},
    {bill:gfVal("gf-elec"),hours:gfVal("gf-h-elec")},
    {bill:gfVal("gf-agua"),hours:gfVal("gf-h-agua")},
    {bill:gfVal("gf-gas"),hours:gfVal("gf-h-gas")},
    {bill:gfVal("gf-wifi"),hours:gfVal("gf-h-wifi")},
    {bill:gfVal("gf-celular"),hours:gfVal("gf-h-celular")},
  ];
  const sub1=cat1.reduce((s,r)=>s+((r.bill/HOURS)*r.hours),0);
  const sub2=gfVal("gf-gasolina")+gfVal("gf-peajes")+gfVal("gf-limpieza")+gfVal("gf-bolsas")+gfVal("gf-otro1")+gfVal("gf-otro2");
  const total=sub1+sub2;
  const ordenes=gfVal("gf-ordenes");
  const porOrden=ordenes>0?total/ordenes:0;

  const obj={
    id:DB.gastosFijos.id||uid(),
    month:parseInt(document.getElementById("gf-month")?.value)||new Date().getMonth()+1,
    year:parseInt(document.getElementById("gf-year")?.value)||new Date().getFullYear(),
    renta:gfVal("gf-renta"),elec:gfVal("gf-elec"),agua:gfVal("gf-agua"),gas:gfVal("gf-gas"),wifi:gfVal("gf-wifi"),celular:gfVal("gf-celular"),
    horasRenta:gfVal("gf-h-renta"),horasElec:gfVal("gf-h-elec"),horasAgua:gfVal("gf-h-agua"),horasGas:gfVal("gf-h-gas"),horasWifi:gfVal("gf-h-wifi"),horasCelular:gfVal("gf-h-celular"),
    gasolina:gfVal("gf-gasolina"),peajes:gfVal("gf-peajes"),limpieza:gfVal("gf-limpieza"),bolsas:gfVal("gf-bolsas"),
    otro1:gfVal("gf-otro1"),otro2:gfVal("gf-otro2"),
    otro1Label:gfStr("gf-otro1-label"),otro2Label:gfStr("gf-otro2-label"),
    ordenes,totalFijo:total,porOrden
  };

  DB.gastosFijos=obj;
  // Sync to settings so products use it automatically
  DB.settings.monthlyFixedCosts=total;
  DB.settings.estimatedMonthlyOrders=ordenes||DB.settings.estimatedMonthlyOrders;
  await saveGastosFijos_cloud(obj);
  await saveSettings_cloud(DB.settings);

  const msg=document.getElementById("gf-saved-msg");
  if(msg){msg.style.display="inline";setTimeout(()=>msg.style.display="none",2500);}
  renderGastosFijos();
}


// ── TOOLTIP SYSTEM ────────────────────────────────────────────────────────────
let activeTooltip = null;
function showTooltip(el, text) {
  hideTooltip();
  const tip = document.createElement('div');
  tip.className = 'tooltip-popup show';
  tip.id = 'active-tooltip';
  tip.textContent = text;
  document.body.appendChild(tip);
  const rect = el.getBoundingClientRect();
  let top = rect.bottom + 8;
  let left = rect.left;
  if (left + 260 > window.innerWidth) left = window.innerWidth - 270;
  if (top + 120 > window.innerHeight) top = rect.top - 130;
  tip.style.top = top + 'px';
  tip.style.left = left + 'px';
  activeTooltip = tip;
  setTimeout(() => document.addEventListener('click', hideTooltip, {once:true}), 10);
}
function hideTooltip() {
  const t = document.getElementById('active-tooltip');
  if (t) t.remove();
  activeTooltip = null;
}
function tip(text) {
  return `<button class="tooltip-btn" onclick="event.stopPropagation();showTooltip(this,'${text.replace(/'/g,"\'")}')">❓</button>`;
}

function openExpModal(id=""){

async function saveExp(id){
  const amount=+val("m-amount");if(!amount)return;
  const obj={id:id||uid(),date:val("m-date"),category:val("m-cat"),description:val("m-desc"),amount};
  if(id){DB.expenses=DB.expenses.map(e=>e.id===id?obj:e);}else{DB.expenses.push(obj);}
  await saveExp_cloud(obj);closeModal();renderExpenses();
}
async function delExp(id){
  const L=TRANSLATIONS[lang];
  if(!confirm(L.expDeleteConfirm))return;
  DB.expenses=DB.expenses.filter(e=>e.id!==id);await delExp_cloud(id);renderExpenses();
}

// ── REPORTS ────────────────────────────────────────────────────────────────────
let repRange="todo";
function renderReports(){
  const L=TRANSLATIONS[lang]; const sym=getSym();
  const now=new Date();
  const inR=d=>{if(repRange==="todo")return true;const dt=new Date(d);if(repRange==="mes")return dt.getMonth()===now.getMonth()&&dt.getFullYear()===now.getFullYear();return(now-dt)/86400000<=7;};
  const fo=DB.orders.filter(o=>inR(o.date));
  const fe=DB.expenses.filter(e=>inR(e.date));
  const rev=fo.filter(o=>o.status==="completada").reduce((s,o)=>s+(+o.total),0);
  const exp=fe.reduce((s,e)=>s+(+e.amount),0);
  const cc=fo.filter(o=>o.status==="completada").length;
  const avg=cc?rev/cc:0;
  const cR={};fo.filter(o=>o.status==="completada").forEach(o=>{cR[o.clientId]=(cR[o.clientId]||0)+(+o.total);});
  const topC=Object.entries(cR).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,v])=>({name:DB.clients.find(c=>c.id===id)?.name||"?",value:+v.toFixed(2)}));
  const pS={};fo.filter(o=>o.status==="completada").forEach(o=>o.items.forEach(it=>{pS[it.productId]=(pS[it.productId]||0)+it.quantity;}));
  const topP=Object.entries(pS).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,qty])=>({name:DB.products.find(p=>p.id===id)?.name||"?",qty}));

  const monthlyFixed=+DB.settings.monthlyFixedCosts||0;
  const estOrders=+DB.settings.estimatedMonthlyOrders||0;
  const ordersThisMonth=DB.orders.filter(o=>o.status==="completada"&&new Date(o.date).getMonth()===now.getMonth()&&new Date(o.date).getFullYear()===now.getFullYear()).length;
  const overheadCovered=ordersThisMonth*(monthlyFixed/Math.max(estOrders,1));
  const overheadPct=monthlyFixed>0?Math.min((overheadCovered/monthlyFixed)*100,100).toFixed(0):100;
  const overheadRemaining=Math.max(monthlyFixed-overheadCovered,0);
  const ordersNeeded=Math.max(estOrders-ordersThisMonth,0);

  document.getElementById("page-reports").innerHTML=`
    <div class="page-header" style="flex-wrap:wrap;gap:10px">
      <h2>${L.repTitle}</h2>
      <div class="flex-row">
        <div class="filter-bar" style="margin-bottom:0">

        </div>
        ${btnHtml(L.repExcel,"exportExcel()","success btn-sm")}
      </div>
    </div>
    <div style="background:#fef3c7;border:1.5px solid #d97706;border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#92400e">
      💡 <strong>${lang==='es'?'Nota importante:':'Important note:'}</strong> ${lang==='es'
        ? 'Los <strong>Gastos Fijos en Ajustes</strong> son solo para calcular el precio de tus productos. Los <strong>Gastos Totales</strong> que ves aquí son los recibos reales que entraste en la sección <em>Gastos</em>. Para evitar duplicados, no entres los mismos gastos en ambos lugares.'
        : 'The <strong>Fixed Costs in Settings</strong> are only used to calculate your product prices. The <strong>Total Expenses</strong> shown here are the real bills you entered in the <em>Expenses</em> section. To avoid duplicates, do not enter the same expenses in both places.'}
    </div>
    ${monthlyFixed>0?`
    <div class="card" style="margin-bottom:16px">
      <div style="font-weight:700;font-size:14px;color:#5a2e0a;margin-bottom:12px">🏠 ${lang==='es'?'Cobertura De Gastos Fijos Este Mes':'Monthly Fixed Cost Coverage'}</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:12px">
        <div style="background:#fdf0e3;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:10px;color:#9a7050">${lang==='es'?'Gastos Fijos Mensuales':'Monthly Fixed Costs'}</div>
          <div style="font-weight:800;font-size:16px;color:#2a1200">${fmt(sym,monthlyFixed)}</div>
        </div>
        <div style="background:#fdf0e3;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:10px;color:#9a7050">${lang==='es'?'Órdenes Este Mes':'Orders This Month'}</div>
          <div style="font-weight:800;font-size:16px;color:#2a1200">${ordersThisMonth} / ${estOrders}</div>
        </div>
        <div style="background:#fdf0e3;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:10px;color:#9a7050">${lang==='es'?'Cubierto':'Covered'}</div>
          <div style="font-weight:800;font-size:16px;color:${+overheadPct>=100?'#166534':'#d97706'}">${fmt(sym,overheadCovered)}</div>
        </div>
        <div style="background:#fdf0e3;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:10px;color:#9a7050">${lang==='es'?'Por Cubrir':'Remaining'}</div>
          <div style="font-weight:800;font-size:16px;color:${overheadRemaining===0?'#166534':'#b91c1c'}">${fmt(sym,overheadRemaining)}</div>
        </div>
      </div>
      <div style="background:#f0e4d0;border-radius:20px;height:12px;overflow:hidden">
        <div style="background:${+overheadPct>=100?'#166534':'#d97706'};height:100%;width:${overheadPct}%;border-radius:20px;transition:width 0.5s"></div>
      </div>
      <div style="font-size:12px;color:#7a5030;margin-top:8px;font-weight:600">
        ${+overheadPct>=100
          ? (lang==='es'?'✅ ¡Gastos fijos completamente cubiertos este mes!':'✅ Fixed costs fully covered this month!')
          : (lang==='es'
            ? `⚠️ Necesitas ${ordersNeeded} orden(es) más para cubrir tus gastos fijos (${overheadPct}% cubierto)`
            : `⚠️ You need ${ordersNeeded} more order(s) to cover your fixed costs (${overheadPct}% covered)`)}
      </div>
    </div>`:""}
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-icon" style="background:#16653418">💰</div><div><div class="stat-value">${fmt(sym,rev)}</div><div class="stat-label">${L.repRevenue}</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#b91c1c18">🧾</div><div><div class="stat-value">${fmt(sym,exp)}</div><div class="stat-label">${L.repExpenses}</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:${rev-exp>=0?"#16653418":"#b91c1c18"}">📈</div><div><div class="stat-value">${fmt(sym,rev-exp)}</div><div class="stat-label">${L.repProfit}</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#7a3f1018">🏷️</div><div><div class="stat-value">${fmt(sym,avg)}</div><div class="stat-label">${L.repAvgTicket}</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#1d4ed818">📋</div><div><div class="stat-value">${fo.length}</div><div class="stat-label">${L.repTotalOrders}</div></div></div>
    </div>
    <div class="two-col">
      <div class="card">
        <div style="font-weight:700;font-size:14px;color:#5a2e0a;margin-bottom:10px">${L.repTopClients}</div>
        ${topC.length===0?`<p style="color:#b09070;font-size:13px">${L.repNoData}</p>`:topC.map((c,i)=>`
          <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0e4d0">
            <div class="flex-row"><span style="font-weight:700;color:#c9956a;font-size:13px">#${i+1}</span><span style="font-size:13px">${esc(c.name)}</span></div>
            <span style="font-weight:700;font-size:13px;color:#166534">${fmt(sym,c.value)}</span>
          </div>`).join("")}
      </div>
      <div class="card">
        <div style="font-weight:700;font-size:14px;color:#5a2e0a;margin-bottom:10px">${L.repTopProducts}</div>
        ${topP.length===0?`<p style="color:#b09070;font-size:13px">${L.repNoData}</p>`:topP.map((p,i)=>`
          <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0e4d0">
            <div class="flex-row"><span style="font-weight:700;color:#c9956a;font-size:13px">#${i+1}</span><span style="font-size:13px">${esc(p.name)}</span></div>
            ${badge(p.qty+" "+L.repUnits,"#7a3f10")}
          </div>`).join("")}
      </div>
    </div>`;
}

  if(msg){msg.style.display="inline";setTimeout(()=>msg.style.display="none",2200);}

// ── EXCEL EXPORT ───────────────────────────────────────────────────────────────
function exportExcel(){
  const sym=getSym();
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Ingrediente","Unidad","Costo","Stock","Mín","Estado"],...DB.ingredients.map(i=>[i.name,i.unit,+i.cost,+i.quantity,+i.minStock,+i.quantity<=+i.minStock?"BAJO":"OK"])]),"Ingredientes");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Producto","Receta","Costo","Precio","Margen%"],...DB.products.map(p=>[p.name,DB.recipes.find(r=>r.id===p.recipeId)?.name||"",+p.cost,productPrice(p),(((productPrice(p))-(+p.cost))/Math.max(+p.cost,0.01)*100).toFixed(1)])]),"Productos");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Fecha","Cliente","Estado","Total","Productos"],...DB.orders.map(o=>[o.date,DB.clients.find(c=>c.id===o.clientId)?.name||"—",o.status,+o.total,o.items.map(it=>`${DB.products.find(p=>p.id===it.productId)?.name||"?"} x${it.quantity}`).join(", ")])]),"Órdenes");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Fecha","Categoría","Descripción","Monto"],...DB.expenses.map(e=>[e.date,e.category,e.description,+e.amount])]),"Gastos");
  const rev=DB.orders.filter(o=>o.status==="completada").reduce((s,o)=>s+(+o.total),0);
  const exp=DB.expenses.reduce((s,e)=>s+(+e.amount),0);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Resumen"],[],["Ingresos",rev],["Gastos",exp],["Utilidad",rev-exp],[],["Moneda",DB.settings.currency],["Margen%",DB.settings.margin]]),"Resumen");
  XLSX.writeFile(wb,`MyBakingPro_${new Date().toISOString().slice(0,10)}.xlsx`);
}

}
