<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#2a1200"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="MyBakingPro"/>
<title>MyBakingPro</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
#auth-screen{position:fixed;inset:0;background:#faf5ed;display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px}
#auth-screen.hidden{display:none}
.auth-box{background:#fffaf4;border-radius:24px;border:1px solid #ead9c0;padding:36px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(100,50,10,0.15)}
.auth-logo{font-family:'Cormorant Garamond',serif;font-size:32px;color:#3a1800;font-weight:700;text-align:center;margin-bottom:4px}
.auth-sub{text-align:center;font-size:13px;color:#9a7050;margin-bottom:28px}
.auth-tabs{display:flex;border-radius:12px;background:#f5e6d3;padding:4px;margin-bottom:24px;gap:4px}
.auth-tab{flex:1;padding:8px;border:none;border-radius:9px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;background:transparent;color:#9a7050;transition:all 0.15s}
.auth-tab.active{background:#7a3f10;color:#fff}
.auth-error{background:#fee2e2;border:1px solid #fca5a5;border-radius:10px;padding:10px 14px;color:#b91c1c;font-size:13px;margin-bottom:14px;display:none}
.auth-error.show{display:block}
.auth-success{background:#dcfce7;border:1px solid #86efac;border-radius:10px;padding:10px 14px;color:#166534;font-size:13px;margin-bottom:14px;display:none}
.auth-success.show{display:block}
.auth-btn{width:100%;padding:12px;border-radius:12px;border:none;background:#7a3f10;color:#fff;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity 0.15s}
.auth-btn:hover{opacity:0.88}
.auth-btn:disabled{opacity:0.55;cursor:not-allowed}
.user-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,235,200,0.7)}
.user-bar button{background:none;border:1px solid rgba(255,200,100,0.3);color:rgba(255,235,200,0.7);border-radius:8px;padding:3px 8px;cursor:pointer;font-size:11px;font-family:'Nunito',sans-serif}
.user-bar button:hover{background:rgba(255,200,100,0.1)}
.lang-btn{background:none;border:1px solid rgba(255,200,100,0.3);color:rgba(255,235,200,0.85);border-radius:8px;padding:4px 10px;cursor:pointer;font-size:11px;font-family:'Nunito',sans-serif;font-weight:800;letter-spacing:0.08em;transition:background 0.15s}
.lang-btn:hover{background:rgba(255,200,100,0.15)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#faf5ed;min-height:100vh}
#app-container{display:flex;min-height:100vh}
.sidebar{width:200px;background:#2a1200;display:flex;flex-direction:column;padding:0 0 16px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,0.08)}
.logo-title{font-family:'Cormorant Garamond',serif;font-size:20px;color:#f5c58a;line-height:1.3}
.logo-sub{font-size:10px;color:rgba(255,220,160,0.35);margin-top:4px;letter-spacing:0.1em}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 16px;background:none;border:none;border-left:3px solid transparent;color:rgba(255,235,200,0.55);cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:500;text-align:left;transition:all 0.14s;position:relative}
.nav-btn.active{background:rgba(245,197,138,0.14);border-left-color:#f5c58a;color:#f5c58a;font-weight:700}
.nav-badge{margin-left:auto;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:800;color:#fff}
.sidebar-footer{padding:10px 16px 0;border-top:1px solid rgba(255,255,255,0.07);font-size:10px;color:rgba(255,230,180,0.25);margin-top:auto}
.main{flex:1;padding:28px 30px;overflow-y:auto;min-width:0}
.page{display:none}.page.active{display:block}
h2{font-family:'Cormorant Garamond',serif;font-size:26px;color:#3a1800;font-weight:700;margin-bottom:16px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.page-header h2{margin-bottom:0}
.card{background:#fffaf4;border-radius:16px;border:1px solid #ead9c0;padding:16px 20px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#fffaf4;border-radius:16px;border:1px solid #ead9c0;padding:16px 18px;display:flex;align-items:center;gap:14px}
.stat-icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
.stat-value{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:800;color:#2a1200;line-height:1.1}
.stat-label{font-size:12px;color:#9a7050;margin-top:2px}
.stat-sub{font-size:11px;font-weight:600;margin-top:1px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.item-card{background:#fffaf4;border-radius:14px;border:1px solid #ead9c0;padding:14px 16px}
.btn{padding:9px 18px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;font-family:'Nunito',sans-serif;display:inline-flex;align-items:center;gap:6px;border:none;white-space:nowrap}
.btn-primary{background:#7a3f10;color:#fff}
.btn-secondary{background:transparent;color:#7a3f10;border:1.5px solid #c9956a}
.btn-success{background:#166534;color:#fff}
.btn-danger{background:#b91c1c;color:#fff}
.btn-sm{padding:5px 11px;font-size:12px}
.btn:hover{opacity:0.85}
.badge{border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700}
.input-field{width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid #e2c9a4;background:#fffaf4;font-size:14px;color:#2a1200;outline:none;font-family:'Nunito',sans-serif;box-sizing:border-box}
.field-label{display:block;font-size:11px;font-weight:700;color:#7a4a1e;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.07em}
.field{margin-bottom:13px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.alert-bar{background:#fef3c7;border:1.5px solid #d97706;border-radius:12px;padding:10px 16px;margin-bottom:16px;color:#92400e;font-size:13px;font-weight:600}
.table-wrap{overflow-x:auto;border-radius:14px;border:1px solid #ead9c0}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 12px;color:#5a2e0a;font-weight:700;font-size:11px;text-transform:uppercase;text-align:left;background:#f5e6d3}
td{padding:9px 12px;border-bottom:1px solid #f0e4d0}
tr:nth-child(even){background:#fdf5e9}
tr:nth-child(odd){background:#fffaf4}
.icon-btn{background:none;border:none;cursor:pointer;padding:2px}
.flex-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.cost-box{background:#fdf0e3;border-radius:12px;padding:14px;margin-bottom:12px}
.cost-summary{background:#fff8f0;border-radius:8px;padding:8px 10px;font-size:12px;color:#5a2e0a;margin-top:10px}
.filter-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:4px 12px;border-radius:20px;border:1.5px solid #c9956a;cursor:pointer;font-size:12px;font-weight:600;font-family:'Nunito',sans-serif;background:transparent;color:#7a3f10}
.filter-btn.active{background:#7a3f10;color:#fff}
.order-card{background:#fffaf4;border-radius:14px;border:1px solid #ead9c0;padding:14px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,8,0,0.75);z-index:1000;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal-box{background:#fdf8f2;border-radius:20px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(100,50,10,0.3);border:1px solid #e8d5bc}
.modal-box.wide{max-width:700px}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 24px 14px;border-bottom:1px solid #f0e4d0;position:sticky;top:0;background:#fdf8f2;z-index:1}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:21px;color:#3a1800;font-weight:700}
.modal-body{padding:20px 24px 24px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
textarea.input-field{min-height:68px;resize:vertical}
select.input-field option{font-family:'Nunito',sans-serif}
.tag{background:#f5e6d3;border-radius:20px;padding:2px 7px;font-size:10px;color:#5a2e0a;display:inline-block;margin:2px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
*{-webkit-tap-highlight-color:rgba(0,0,0,0)}
button,.btn,.nav-btn,.filter-btn,.icon-btn{touch-action:manipulation;-webkit-appearance:none;cursor:pointer}
@media(max-width:768px){
  .sidebar{width:56px}
  .logo-title,.logo-sub,.nav-label,.lang-label{display:none}
  .main{padding:12px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .cards-grid{grid-template-columns:1fr}
  .two-col{grid-template-columns:1fr}
  .grid2{grid-template-columns:1fr}
  .modal-box{max-width:calc(100vw - 16px)}
  .btn{padding:10px 14px;font-size:13px}
  table{font-size:12px}
  th,td{padding:7px 8px}
  .order-card{flex-direction:column}
  .filter-bar{gap:4px}
  .filter-btn{padding:4px 8px;font-size:11px}
}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">🎂 MyBakingPro</div>
    <div class="auth-sub" id="auth-tagline">Repostería Rentable</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login-btn" onclick="switchTab('login')" data-key="tabLogin">Iniciar Sesión</button>
      <button class="auth-tab" id="tab-signup-btn" onclick="switchTab('signup')" data-key="tabSignup">Crear Cuenta</button>
    </div>
    <div class="auth-error" id="auth-error"></div>
    <div class="auth-success" id="auth-success"></div>
    <div id="login-form">
      <div class="field"><label class="field-label" id="lbl-login-email">Correo Electrónico</label>
        <input class="input-field" id="login-email" type="email" placeholder="tu@correo.com"/></div>
      <div class="field"><label class="field-label" id="lbl-login-pass">Contraseña</label>
        <input class="input-field" id="login-password" type="password" placeholder="••••••••"/></div>
      <button class="auth-btn" id="login-btn" onclick="doLogin()">Entrar</button>
    </div>
    <div id="signup-form" style="display:none">
      <div class="field"><label class="field-label" id="lbl-signup-email">Correo Electrónico</label>
        <input class="input-field" id="signup-email" type="email" placeholder="tu@correo.com"/></div>
      <div class="field"><label class="field-label" id="lbl-signup-pass">Contraseña</label>
        <input class="input-field" id="signup-password" type="password"/></div>
      <div class="field"><label class="field-label" id="lbl-signup-confirm">Confirmar Contraseña</label>
        <input class="input-field" id="signup-confirm" type="password"/></div>
      <button class="auth-btn" id="signup-btn" onclick="doSignup()">Crear Mi Cuenta</button>
    </div>
    <div style="margin-top:20px;padding-top:16px;border-top:1px solid #ead9c0;text-align:center">
      <div style="font-size:12px;color:#9a7050;margin-bottom:10px" id="auth-nosub-text">¿Aún no tienes suscripción?</div>
      <a href="https://buy.stripe.com/test_8x2fZgfPIapY2aab86enS00" target="_blank" id="auth-stripe-btn" style="display:block;width:100%;padding:11px;border-radius:12px;border:2px solid #7a3f10;background:transparent;color:#7a3f10;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;box-sizing:border-box">
        🎂 Suscribirse — $12.99/mes
      </a>
      <div style="font-size:11px;color:#b09070;margin-top:8px" id="auth-access-text">Acceso completo a MyBakingPro</div>
    </div>
  </div>
</div>

<!-- APP CONTAINER -->
<div id="app-container" style="display:none">
<aside class="sidebar">
  <div class="logo">
    <div class="logo-title">🎂 My<strong>Baking</strong><br><strong style="font-size:22px">Pro</strong></div>
    <div class="logo-sub" id="sidebar-tagline">REPOSTERÍA RENTABLE</div>
  </div>
  <nav id="nav"></nav>
  <div class="sidebar-footer" id="sidebar-footer"></div>
  <div style="padding:8px 16px 4px;display:flex;flex-direction:column;gap:6px">
    <div class="user-bar" id="user-bar" style="display:none">
      <span id="user-email-display" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px"></span>
      <button id="logout-btn" onclick="doLogout()">Salir</button>
    </div>
    <button class="lang-btn" onclick="toggleLang()" id="lang-toggle-btn" title="Switch language / Cambiar idioma">🌐 <span id="lang-toggle-label">EN</span></button>
  </div>
</aside>

<main class="main">
  <div id="page-dashboard" class="page active"></div>
  <div id="page-ingredients" class="page"></div>
  <div id="page-recipes" class="page"></div>
  <div id="page-products" class="page"></div>
  <div id="page-clients" class="page"></div>
  <div id="page-orders" class="page"></div>
  <div id="page-expenses" class="page"></div>
  <div id="page-reports" class="page"></div>
  <div id="page-settings" class="page"></div>
</main>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-box" id="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="icon-btn" onclick="closeModal()" style="color:#a0785a;font-size:20px">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

async function doLogin() {
  const L = TRANSLATIONS[lang];
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showAuthError(L.errEmailPass);
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = L.loginBtnLoading;
  const { error } = await _supabase.auth.signInWithPassword({ email, password });
  btn.disabled = false; btn.textContent = L.loginBtn;
  if (error) return showAuthError(L.errWrongCreds);
}

async function doSignup() {
  const L = TRANSLATIONS[lang];
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const confirm = document.getElementById('signup-confirm').value;
  if (!email || !password) return showAuthError(L.errFillAll);
  if (password.length < 6) return showAuthError(L.errPassLength);
  if (password !== confirm) return showAuthError(L.errPassMatch);
  const btn = document.getElementById('signup-btn');
  btn.disabled = true; btn.textContent = L.signupBtnLoading;
  const { error } = await _supabase.auth.signUp({ email, password });
  btn.disabled = false; btn.textContent = L.signupBtn;
  if (error) return showAuthError(L.errSignupPrefix + error.message);
  showAuthSuccess(L.successSignup);
}

async function doLogout() {
  await _supabase.auth.signOut();
  currentUser = null;
  window.location.reload();
}

async function loadFromCloud(){
  if(!currentUser)return;
  const uid=currentUser.id;
  const [ing,rec,prod,ord,cli,exp,set]=await Promise.all([
    _supabase.from("mbp_ingredients").select("*").eq("user_id",uid),
    _supabase.from("mbp_recipes").select("*").eq("user_id",uid),
    _supabase.from("mbp_products").select("*").eq("user_id",uid),
    _supabase.from("mbp_orders").select("*").eq("user_id",uid),
    _supabase.from("mbp_clients").select("*").eq("user_id",uid),
    _supabase.from("mbp_expenses").select("*").eq("user_id",uid),
    _supabase.from("mbp_settings").select("*").eq("user_id",uid).single(),
  ]);
  DB.ingredients=(ing.data||[]).map(r=>({id:r.id,name:r.name,unit:r.unit,cost:r.cost,quantity:r.quantity,minStock:r.min_stock}));
  DB.recipes=(rec.data||[]).map(r=>({id:r.id,name:r.name,description:r.description,servings:r.servings,laborHours:r.labor_hours,instructions:r.instructions,items:r.items||[]}));
  DB.products=(prod.data||[]).map(r=>({id:r.id,name:r.name,description:r.description,recipeId:r.recipe_id,quantity:r.quantity,extraCost:r.extra_cost,price:r.price,cost:r.cost,recipes:r.recipes||[]}));
  DB.orders=(ord.data||[]).map(r=>({id:r.id,clientId:r.client_id,date:r.date,deliveryDate:r.delivery_date,status:r.status,notes:r.notes,items:r.items||[],total:r.total}));
  DB.clients=(cli.data||[]).map(r=>({id:r.id,name:r.name,phone:r.phone,email:r.email,address:r.address,notes:r.notes}));
  DB.expenses=(exp.data||[]).map(r=>({id:r.id,date:r.date,category:r.category,description:r.description,amount:r.amount}));
  if(set.data)DB.settings={margin:set.data.margin,labor:set.data.labor,overhead:set.data.overhead,currency:set.data.currency};
}

}

// ── COST HELPERS ───────────────────────────────────────────────────────────────
function recipeCost(r,servings=1){
  const ing=r.items.reduce((s,it)=>{const i=DB.ingredients.find(x=>x.id===it.ingredientId);return s+(i?+i.cost*+it.quantity:0);},0);
  const total=ing+(+r.laborHours||0)*(+DB.settings.labor+(+DB.settings.overhead));
  const recServings=+r.servings||1;
  return (total/recServings)*servings;
}
function productCost(p){
  if(p.recipes&&p.recipes.length>0){
    return p.recipes.reduce((s,pr)=>{const r=DB.recipes.find(x=>x.id===pr.recipeId)||{items:[],laborHours:0,servings:1};return s+recipeCost(r,+pr.servings||1);},0)+(+p.extraCost||0);
  }
  return recipeCost(DB.recipes.find(r=>r.id===p.recipeId)||{items:[],laborHours:0,servings:1},+p.quantity||1)+(+p.extraCost||0);
}
function productPrice(p){return +p.price||productCost(p)*(1+(+DB.settings.margin/100));}

async function saveIng(id){
  const name=val("m-name");if(!name)return;
  const obj={id:id||uid(),name,unit:val("m-unit"),cost:+val("m-cost"),quantity:+val("m-qty"),minStock:+val("m-min")};
  if(id){DB.ingredients=DB.ingredients.map(i=>i.id===id?obj:i);}else{DB.ingredients.push(obj);}
  await saveIng_cloud(obj);closeModal();renderIngredients();renderNav();
}
async function delIng(id){
  const L=TRANSLATIONS[lang];
  if(!confirm(L.ingDeleteConfirm))return;
  DB.ingredients=DB.ingredients.filter(i=>i.id!==id);
  await delIng_cloud(id);renderIngredients();renderNav();
}

let recItems=[];
let editingRecId="";
function openRecModal(id=""){
  const L=TRANSLATIONS[lang];
  editingRecId=id;
  const r=DB.recipes.find(x=>x.id===id)||{name:"",description:"",servings:1,laborHours:0,instructions:"",items:[]};
  recItems=[...r.items];
  openModal(id?L.recModalEdit:L.recModalNew,buildRecForm(r,id),true);
}

function buildRecForm(r,id){
  const L=TRANSLATIONS[lang]; const sym=getSym();
  const ingOpts=DB.ingredients.map(i=>`<option value="${i.id}">${esc(i.name)} (${esc(i.unit)})</option>`).join("");
  const itemsHtml=recItems.map((it,idx)=>{const ing=DB.ingredients.find(i=>i.id===it.ingredientId);return `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #e8d0b0;font-size:13px">
      <span>${esc(ing?.name)} — ${it.quantity} ${esc(ing?.unit)}</span>
      <div class="flex-row"><span style="color:#7a3f10;font-weight:600">${fmt(sym,(+ing?.cost||0)*it.quantity)}</span>
      <button class="icon-btn" style="color:#b91c1c" onclick="removeRecItem(${idx})">✕</button></div>
    </div>`;}).join("");
  const fIC=recItems.reduce((s,it)=>{const i=DB.ingredients.find(x=>x.id===it.ingredientId);return s+(i?+i.cost*it.quantity:0);},0);
  const fTC=fIC+(+(r.laborHours||0))*(+DB.settings.labor+(+DB.settings.overhead));
  return `
    <div class="grid2">
      ${fieldHtml(L.recLblName,`<input class="input-field" id="m-name" value="${esc(r.name||"")}"/>`)}
      ${fieldHtml(L.recLblDesc,`<input class="input-field" id="m-desc" value="${esc(r.description||"")}"/>`)}
      ${fieldHtml(L.recLblServings,`<input class="input-field" id="m-serv" type="number" value="${r.servings||1}"/>`)}
      ${fieldHtml(L.recLblLabor,`<input class="input-field" id="m-labor" type="number" value="${r.laborHours||0}" onchange="refreshRecForm('${r.id||""}')"/>`)}
    </div>
    ${fieldHtml(L.recLblInstructions,`<textarea class="input-field" id="m-inst" placeholder="${L.recInstructionsPlaceholder}">${esc(r.instructions||"")}</textarea>`)}
    <div class="cost-box">
      <div style="font-size:13px;font-weight:700;color:#5a2e0a;margin-bottom:8px">${L.recIngSection}</div>
      <div id="rec-items-list">${itemsHtml}</div>
      <div class="flex-row" style="margin-top:10px">
        <select class="input-field" id="m-ing-sel" style="flex:2"><option value="">${L.recSelectIngredient}</option>${ingOpts}</select>
        <input class="input-field" id="m-ing-qty" type="number" placeholder="${L.recQtyPlaceholder}" style="flex:1;min-width:65px"/>
        <button class="btn btn-primary btn-sm" onclick="addRecItem()">+</button>
      </div>
      ${recItems.length>0?`<div class="cost-summary">${L.recCostSummary(fmt(sym,fIC),fmt(sym,fTC),fmt(sym,fTC*(1+(+DB.settings.margin/100))))}</div>`:""}
    </div>
    <div class="modal-footer">
      ${btnHtml(L.btnCancel,"closeModal()","secondary")}
      ${btnHtml(L.btnSave,`saveRec('${id}')","primary`)}
    </div>`;
}

function addRecItem(){
  const ingId=val("m-ing-sel");const qty=+val("m-ing-qty");
  if(!ingId||!qty)return;
  const ex=recItems.findIndex(i=>i.ingredientId===ingId);
  if(ex>=0)recItems[ex].quantity=qty;else recItems.push({ingredientId:ingId,quantity:qty});
  const r={name:val("m-name"),description:val("m-desc"),servings:+val("m-serv"),laborHours:+val("m-labor"),instructions:val("m-inst"),items:recItems};
  document.getElementById("modal-body").innerHTML=buildRecForm(r,editingRecId);
}
function removeRecItem(idx){
  recItems.splice(idx,1);
  const r={name:val("m-name"),description:val("m-desc"),servings:+val("m-serv"),laborHours:+val("m-labor"),instructions:val("m-inst"),items:recItems};
  document.getElementById("modal-body").innerHTML=buildRecForm(r,editingRecId);
}
async function saveRec(id){
  const name=val("m-name");if(!name)return;
  const recId=id&&id.length>0?id:uid();
  const obj={id:recId,name,description:val("m-desc"),servings:+val("m-serv"),laborHours:+val("m-labor"),instructions:val("m-inst"),items:[...recItems]};
  if(id&&id.length>0){DB.recipes=DB.recipes.map(r=>r.id===id?obj:r);}else{DB.recipes.push(obj);}
  await saveRec_cloud(obj);closeModal();renderRecipes();
}
async function delRec(id){
  const L=TRANSLATIONS[lang];
  if(!confirm(L.recDeleteConfirm))return;
  DB.recipes=DB.recipes.filter(r=>r.id!==id);await delRec_cloud(id);renderRecipes();
}

let prodRecipes=[]; // [{recipeId, servings}]
let editingProdId="";

function openProdModal(id=""){
  const L=TRANSLATIONS[lang];
  editingProdId=id;
  const p=DB.products.find(x=>x.id===id)||{};
  // Support legacy single-recipe products
  prodRecipes=p.recipes&&p.recipes.length>0?[...p.recipes]:(p.recipeId?[{recipeId:p.recipeId,servings:p.quantity||1}]:[]);
  openModal(id?L.prodModalEdit:L.prodModalNew,buildProdForm(p,id),true);
}

function buildProdForm(p,id){
  const L=TRANSLATIONS[lang]; const sym=getSym();
  const recOpts=DB.recipes.map(r=>`<option value="${r.id}">${esc(r.name)}</option>`).join("");
  const recipesHtml=prodRecipes.map((pr,idx)=>{
    const r=DB.recipes.find(x=>x.id===pr.recipeId);
    const c=r?recipeCost(r,+pr.servings||1):0;
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #e8d0b0;font-size:13px">
      <span>${esc(r?.name||"?")} × ${pr.servings} ${lang==="en"?"serving(s)":"porción(es)"}</span>
      <div class="flex-row"><span style="color:#7a3f10;font-weight:600">${fmt(sym,c)}</span>
      <button class="icon-btn" style="color:#b91c1c" onclick="removeProdRecipe(${idx})">✕</button></div>
    </div>`;}).join("");
  const totalRecipeCost=prodRecipes.reduce((s,pr)=>{const r=DB.recipes.find(x=>x.id===pr.recipeId)||{items:[],laborHours:0,servings:1};return s+recipeCost(r,+pr.servings||1);},0);
  const extra=+(p.extraCost||0);
  const totalCost=totalRecipeCost+extra;
  const suggested=totalCost*(1+(+DB.settings.margin/100));
  return `
    ${fieldHtml(L.prodLblName,`<input class="input-field" id="m-name" value="${esc(p.name||"")}"/>`)}
    ${fieldHtml(L.prodLblDesc,`<input class="input-field" id="m-desc" value="${esc(p.description||"")}"/>`)}
    <div class="cost-box">
      <div style="font-size:13px;font-weight:700;color:#5a2e0a;margin-bottom:8px">${lang==="en"?"Recipes":"Recetas"}</div>
      <div id="prod-recipes-list">${recipesHtml}</div>
      <div class="flex-row" style="margin-top:10px">
        <select class="input-field" id="m-rec-sel" style="flex:2"><option value="">${L.prodSelectRecipe}</option>${recOpts}</select>
        <input class="input-field" id="m-rec-srv" type="number" value="1" min="0.1" step="0.1" placeholder="${lang==="en"?"Servings":"Porciones"}" style="flex:1;min-width:70px"/>
        <button class="btn btn-primary btn-sm" onclick="addProdRecipe()">+</button>
      </div>
      ${prodRecipes.length>0?`<div class="cost-summary">${L.prodCostHint(fmt(sym,totalCost),fmt(sym,suggested))}</div>`:""}
    </div>
    ${fieldHtml(L.prodLblExtra,`<input class="input-field" id="m-extra" type="number" value="${p.extraCost||0}" oninput="refreshProdForm('${id||""}')"/>`)}
    ${fieldHtml(L.prodLblPrice,`<input class="input-field" id="m-price" type="number" value="${p.price||""}"/>`)}
    <div class="modal-footer">
      ${btnHtml(L.btnCancel,"closeModal()","secondary")}
      ${btnHtml(L.btnSave,`saveProd('${id||""}')","primary`)}
    </div>`;
}

function addProdRecipe(){
  const rid=val("m-rec-sel");const srv=+val("m-rec-srv")||1;
  if(!rid)return;
  prodRecipes.push({recipeId:rid,servings:srv});
  const p={name:val("m-name"),description:val("m-desc"),extraCost:+val("m-extra")||0,price:val("m-price")};
  document.getElementById("modal-body").innerHTML=buildProdForm(p,editingProdId);
}

function removeProdRecipe(idx){

        <div style="font-weight:700;font-size:14px;color:#5a2e0a;margin-bottom:12px">${L.setCurrencySection}</div>
        ${fieldHtml(L.setLblCurrency,`<select class="input-field" id="s-currency">${curOpts}</select>`)}
        <div style="background:#fdf0e3;border-radius:10px;padding:10px;font-size:13px;color:#5a2e0a">${L.setCurrencyHint(cur.symbol,cur.code)}</div>
      </div>
      <div class="card" style="margin-bottom:14px">
        <div style="font-weight:700;font-size:14px;color:#5a2e0a;margin-bottom:12px">${L.setPricingSection}</div>
        ${fieldHtml(L.setLblMargin,`<input class="input-field" id="s-margin" type="number" value="${DB.settings.margin}"/>`)}
        ${fieldHtml(L.setLblLabor(sym),`<input class="input-field" id="s-labor" type="number" value="${DB.settings.labor}"/>`)}
        ${fieldHtml(L.setLblOverhead(sym),`<input class="input-field" id="s-overhead" type="number" value="${DB.settings.overhead}"/>`)}
      </div>
      <div class="card" style="margin-bottom:16px">
        <div style="font-weight:700;font-size:14px;color:#5a2e0a;margin-bottom:8px">${L.setFormulaSection}</div>
        <div style="background:#f5e6d3;border-radius:10px;padding:12px;font-size:13px;color:#4a2000;line-height:1.9">
          ${L.setFormulaText(sym,DB.settings.labor,DB.settings.overhead,DB.settings.margin)}
        </div>
      </div>
      <div class="flex-row">
        <button class="btn btn-primary" onclick="saveSettings()">${L.setSaveBtn}</button>
        <button class="btn btn-success btn-sm" onclick="exportExcel()">${L.setExportBtn}</button>
        <span id="saved-msg" style="color:#166534;font-size:13px;font-weight:700;display:none">${L.setSavedMsg}</span>
      </div>
    </div>`;
}

async function saveSettings(){
  const L=TRANSLATIONS[lang];
  DB.settings={margin:+val("s-margin"),labor:+val("s-labor"),overhead:+val("s-overhead"),currency:val("s-currency")};
  await saveSettings_cloud(DB.settings);
  const msg=document.getElementById("saved-msg");
  if(msg){msg.style.display="inline";setTimeout(()=>msg.style.display="none",2200);}
  renderNav();
}

// ── EXCEL EXPORT ───────────────────────────────────────────────────────────────
function exportExcel(){
  const sym=getSym();
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Ingrediente","Unidad","Costo","Stock","Mín","Estado"],...DB.ingredients.map(i=>[i.name,i.unit,+i.cost,+i.quantity,+i.minStock,+i.quantity<=+i.minStock?"BAJO":"OK"])]),"Ingredientes");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Producto","Receta","Costo","Precio","Margen%"],...DB.products.map(p=>[p.name,DB.recipes.find(r=>r.id===p.recipeId)?.name||"",+p.cost,productPrice(p),(((productPrice(p))-(+p.cost))/Math.max(+p.cost,0.01)*100).toFixed(1)])]),"Productos");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Fecha","Cliente","Estado","Total","Productos"],...DB.orders.map(o=>[o.date,DB.clients.find(c=>c.id===o.clientId)?.name||"—",o.status,+o.total,o.items.map(it=>`${DB.products.find(p=>p.id===it.productId)?.name||"?"} x${it.quantity}`).join(", ")])]),"Órdenes");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Fecha","Categoría","Descripción","Monto"],...DB.expenses.map(e=>[e.date,e.category,e.description,+e.amount])]),"Gastos");
  const rev=DB.orders.filter(o=>o.status==="completada").reduce((s,o)=>s+(+o.total),0);
  const exp=DB.expenses.reduce((s,e)=>s+(+e.amount),0);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Resumen"],[],["Ingresos",rev],["Gastos",exp],["Utilidad",rev-exp],[],["Moneda",DB.settings.currency],["Margen%",DB.settings.margin]]),"Resumen");
  XLSX.writeFile(wb,`MyBakingPro_${new Date().toISOString().slice(0,10)}.xlsx`);
}

applyLangToStaticElements();
document.getElementById('auth-screen').style.display = 'flex';
document.getElementById('app-container').style.display = 'none';
renderNav();

_supabase.auth.onAuthStateChange(async (event, session) => {
  if (session && session.user) {
    currentUser = session.user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-container').style.display = 'flex';
    document.getElementById('user-bar').style.display = 'flex';
    document.getElementById('user-email-display').textContent = session.user.email;
    await loadFromCloud();
    applyLangToStaticElements();
    renderNav();
    renderPage('dashboard');
  } else if (event === 'SIGNED_OUT') {
    currentUser = null;
    window.location.reload();
  }
});

_supabase.auth.getSession().then(async ({ data: { session } }) => {
  if (session && session.user) {
    currentUser = session.user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-container').style.display = 'flex';
    document.getElementById('user-bar').style.display = 'flex';
    document.getElementById('user-email-display').textContent = session.user.email;
    await loadFromCloud();
    applyLangToStaticElements();
    renderNav();
    renderPage('dashboard');
  }
});
</script>
