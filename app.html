<script>
// ── SUPABASE AUTH ──────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://bpchubmwddaibfaxdglk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3uEM6fxy-J4Ce7c5hUOpEA_cfkq9lyp';
const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: true,
    storageKey: 'mbp-auth',
    storage: {
      getItem: (key) => { try { return window.sessionStorage.getItem(key); } catch { return null; } },
      setItem: (key, value) => { try { window.sessionStorage.setItem(key, value); } catch {} },
      removeItem: (key) => { try { window.sessionStorage.removeItem(key); } catch {} }
    }
  }
});

let currentUser = null;

function switchTab(tab) {
  document.getElementById('login-form').style.display = tab==='login'?'block':'none';
  document.getElementById('signup-form').style.display = tab==='signup'?'block':'none';
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(tab==='login'?i===0:i===1)));
  hideAuthMessages();
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('auth-success').classList.remove('show');
}

function showAuthSuccess(msg) {
  const el = document.getElementById('auth-success');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('auth-error').classList.remove('show');
}

function hideAuthMessages() {
  document.getElementById('auth-error').classList.remove('show');
  document.getElementById('auth-success').classList.remove('show');
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showAuthError('Por favor ingresa tu correo y contraseña.');
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Entrando…';
  const { error } = await _supabase.auth.signInWithPassword({ email, password });
  btn.disabled = false; btn.textContent = 'Entrar';
  if (error) return showAuthError('Correo o contraseña incorrectos.');
}

async function doSignup() {
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const confirm = document.getElementById('signup-confirm').value;
  if (!email || !password) return showAuthError('Por favor completa todos los campos.');
  if (password.length < 6) return showAuthError('La contraseña debe tener mínimo 6 caracteres.');
  if (password !== confirm) return showAuthError('Las contraseñas no coinciden.');
  const btn = document.getElementById('signup-btn');
  btn.disabled = true; btn.textContent = 'Creando cuenta…';
  const { error } = await _supabase.auth.signUp({ email, password });
  btn.disabled = false; btn.textContent = 'Crear Mi Cuenta';
  if (error) return showAuthError('Error al crear la cuenta: ' + error.message);
  showAuthSuccess('¡Cuenta creada! Revisa tu correo para confirmar tu cuenta y luego inicia sesión.');
}

async function doLogout() {
  await _supabase.auth.signOut();
  currentUser = null;
  window.location.reload();
}

// Listen for auth state changes
_supabase.auth.onAuthStateChange(async (event, session) => {
  if (session && session.user) {
    currentUser = session.user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-container').style.display = 'flex';
    document.getElementById('user-bar').style.display = 'flex';
    document.getElementById('user-email-display').textContent = session.user.email;
    await loadFromCloud();
    renderNav();
    renderPage('dashboard');
  } else {
    currentUser = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-container').style.display = 'none';
    document.getElementById('user-bar').style.display = 'none';
  }
});

// ── STATE ──────────────────────────────────────────────────────────────────
// ── SUPABASE DATA FUNCTIONS ────────────────────────────────────────────────
const TABLE_MAP={ingredients:"mbp_ingredients",recipes:"mbp_recipes",products:"mbp_products",orders:"mbp_orders",clients:"mbp_clients",expenses:"mbp_expenses",settings:"mbp_settings"};

async function loadFromCloud(){
  if(!currentUser)return;
  const uid=currentUser.id;
  const [ing,rec,prod,ord,cli,exp,set]=await Promise.all([
    _supabase.from("mbp_ingredients").select("*").eq("user_id",uid),
    _supabase.from("mbp_recipes").select("*").eq("user_id",uid),
    _supabase.from("mbp_products").select("*").eq("user_id",uid),
    _supabase.from("mbp_orders").select("*").eq("user_id",uid),
    _supabase.from("mbp_clients").select("*").eq("user_id",uid),
    _supabase.from("mbp_expenses").select("*").eq("user_id",uid),
    _supabase.from("mbp_settings").select("*").eq("user_id",uid).single(),
  ]);
  DB.ingredients=(ing.data||[]).map(r=>({id:r.id,name:r.name,unit:r.unit,cost:r.cost,quantity:r.quantity,minStock:r.min_stock}));
  DB.recipes=(rec.data||[]).map(r=>({id:r.id,name:r.name,description:r.description,servings:r.servings,laborHours:r.labor_hours,instructions:r.instructions,items:r.items||[]}));
  DB.products=(prod.data||[]).map(r=>({id:r.id,name:r.name,description:r.description,recipeId:r.recipe_id,quantity:r.quantity,extraCost:r.extra_cost,price:r.price,cost:r.cost}));
  DB.orders=(ord.data||[]).map(r=>({id:r.id,clientId:r.client_id,date:r.date,deliveryDate:r.delivery_date,status:r.status,notes:r.notes,items:r.items||[],total:r.total}));
  DB.clients=(cli.data||[]).map(r=>({id:r.id,name:r.name,phone:r.phone,email:r.email,address:r.address,notes:r.notes}));
  DB.expenses=(exp.data||[]).map(r=>({id:r.id,date:r.date,category:r.category,description:r.description,amount:r.amount}));
  if(set.data)DB.settings={margin:set.data.margin,labor:set.data.labor,overhead:set.data.overhead,currency:set.data.currency};
}

  const uid=currentUser.id;
  await _supabase.from("mbp_ingredients").upsert({id:obj.id,user_id:uid,name:obj.name,unit:obj.unit,cost:obj.cost,quantity:obj.quantity,min_stock:obj.minStock});
}

async function saveExp_cloud(obj){

async function saveSettings_cloud(obj){
  const uid=currentUser.id;
  await _supabase.from("mbp_settings").upsert({user_id:uid,margin:obj.margin,labor:obj.labor,overhead:obj.overhead,currency:obj.currency},{onConflict:"user_id"});

const save=(k,v)=>{}; // kept for compatibility but not used

const CURRENCIES=[{code:"USD",symbol:"$",name:"Dólar (USD)"},{code:"MXN",symbol:"$",name:"Peso Mexicano (MXN)"},{code:"COP",symbol:"$",name:"Peso Colombiano (COP)"},{code:"ARS",symbol:"$",name:"Peso Argentino (ARS)"},{code:"PEN",symbol:"S/",name:"Sol Peruano (PEN)"},{code:"CRC",symbol:"₡",name:"Colón Costarricense (CRC)"},{code:"GTQ",symbol:"Q",name:"Quetzal Guatemalteco (GTQ)"},{code:"EUR",symbol:"€",name:"Euro (EUR)"},{code:"DOP",symbol:"RD$",name:"Peso Dominicano (DOP)"}];
const UNITS=["g","kg","ml","L","oz","lb","taza","cdta","cda","unidad","paquete"];
const EXPENSE_CATS=["Luz","Gas","Agua","Renta","Empaque","Marketing","Mantenimiento","Otro"];
const STATUS_COLORS={pendiente:"#d97706","en proceso":"#2563eb",completada:"#16a34a",cancelada:"#dc2626"};
const DEF_SETTINGS={margin:30,labor:5,overhead:3,currency:"USD"};

let DB={
  ingredients:[],
  recipes:[],
  products:[],
  orders:[],
  clients:[],
  expenses:[],
  settings:{...DEF_SETTINGS}
};

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmt=(sym,n)=>`${sym}${(+n||0).toLocaleString("es",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const getSym=()=>CURRENCIES.find(c=>c.code===DB.settings.currency)?.symbol||"$";
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ── NAVIGATION ─────────────────────────────────────────────────────────────
const NAV=[
  {id:"dashboard",label:"Home",icon:"🏠"},
  {id:"ingredients",label:"Inventario",icon:"📦"},
  {id:"recipes",label:"Recetas",icon:"📖"},
  {id:"products",label:"Productos",icon:"🎂"},
  {id:"clients",label:"Clientes",icon:"👥"},
  {id:"orders",label:"Órdenes",icon:"📋"},
  {id:"expenses",label:"Gastos",icon:"💸"},
  {id:"reports",label:"Reportes",icon:"📊"},
  {id:"settings",label:"Ajustes",icon:"⚙️"},
];

let currentPage="dashboard";

function renderNav(){
  const lowC=DB.ingredients.filter(i=>+i.quantity<=+i.minStock&&+i.minStock>0).length;
  const pendC=DB.orders.filter(o=>o.status==="pendiente").length;
  document.getElementById("nav").innerHTML=NAV.map(n=>{
    let badge="";
    if(n.id==="ingredients"&&lowC>0)badge=`<span class="nav-badge" style="background:#dc2626">${lowC}</span>`;
    if(n.id==="orders"&&pendC>0)badge=`<span class="nav-badge" style="background:#d97706">${pendC}</span>`;
    return `<button class="nav-btn${n.id===currentPage?" active":""}" onclick="goTo('${n.id}')">
      <span>${n.icon}</span><span class="nav-label">${esc(n.label)}</span>${badge}
    </button>`;
  }).join("");
  document.getElementById("sidebar-footer").textContent=DB.settings.currency+" · MyBakingPro";
}

function goTo(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-"+page).classList.add("active");
  currentPage=page;
  renderNav();
  renderPage(page);
}

function renderPage(page){
  const pages={dashboard:renderDashboard,ingredients:renderIngredients,recipes:renderRecipes,products:renderProducts,clients:renderClients,orders:renderOrders,expenses:renderExpenses,reports:renderReports,settings:renderSettings};
  if(pages[page])pages[page]();
}

// ── MODAL ──────────────────────────────────────────────────────────────────
function openModal(title,html,wide=false){
  document.getElementById("modal-title").textContent=title;
  document.getElementById("modal-body").innerHTML=html;
  document.getElementById("modal-box").className="modal-box"+(wide?" wide":"");
  document.getElementById("modal").classList.add("open");
}
function closeModal(){document.getElementById("modal").classList.remove("open");}

// ── HELPERS ────────────────────────────────────────────────────────────────
function badge(text,color){return `<span class="badge" style="background:${color}22;color:${color}">${esc(text)}</span>`;}
function btnHtml(label,onclick,variant="primary",small=false){return `<button class="btn btn-${variant}${small?" btn-sm":""}" onclick="${onclick}">${label}</button>`;}
function fieldHtml(label,inputHtml){return `<div class="field"><label class="field-label">${esc(label)}</label>${inputHtml}</div>`;}
function inputHtml(id,type="text",value="",placeholder=""){return `<input class="input-field" id="${id}" type="${type}" value="${esc(value)}" placeholder="${esc(placeholder)}"/>`;}
function selectHtml(id,options,selected=""){return `<select class="input-field" id="${id}">${options.map(o=>`<option value="${esc(o.value)}"${o.value===selected?" selected":""}>${esc(o.label)}</option>`).join("")}</select>`;}
function val(id){const el=document.getElementById(id);return el?el.value:"";}

// ── RECIPE/PRODUCT COST ────────────────────────────────────────────────────
function recipeCost(r){
  const ing=r.items.reduce((s,it)=>{const i=DB.ingredients.find(x=>x.id===it.ingredientId);return s+(i?+i.cost*+it.quantity:0);},0);
  return ing+(+r.laborHours||0)*(+DB.settings.labor+(+DB.settings.overhead));
}
function productCost(p){
  return recipeCost(DB.recipes.find(r=>r.id===p.recipeId)||{items:[],laborHours:0})*(+p.quantity||1)+(+p.extraCost||0);
}
function productPrice(p){return +p.price||productCost(p)*(1+(+DB.settings.margin/100));}

// ── DASHBOARD ──────────────────────────────────────────────────────────────

  const comp=DB.orders.filter(o=>o.status==="completada");

  const exp=DB.expenses.reduce((s,e)=>s+(+e.amount),0);
  const pending=DB.orders.filter(o=>o.status==="pendiente").length;
  const lowStock=DB.ingredients.filter(i=>+i.quantity<=+i.minStock&&+i.minStock>0).length;
  const pSales={};comp.forEach(o=>o.items.forEach(it=>{pSales[it.productId]=(pSales[it.productId]||0)+it.quantity;}));
  const topP=Object.entries(pSales).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,qty])=>({name:DB.products.find(p=>p.id===id)?.name||"?",qty}));
  const recent=[...DB.orders].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);

  document.getElementById("page-dashboard").innerHTML=`
    ${lowStock>0?`<div class="alert-bar">⚠️ ${lowStock} ingrediente(s) con stock bajo — revisa el Inventario</div>`:""}
    <div class="page-header"><h2>Home</h2>${badge(DB.settings.currency,"#7a3f10")}</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-icon" style="background:#16653418">💰</div><div><div class="stat-value">${fmt(sym,rev)}</div><div class="stat-label">Ingresos Totales</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#b91c1c18">🧾</div><div><div class="stat-value">${fmt(sym,exp)}</div><div class="stat-label">Gastos Totales</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:${rev-exp>=0?"#16653418":"#b91c1c18"}">📈</div><div><div class="stat-value">${fmt(sym,rev-exp)}</div><div class="stat-label">Utilidad Neta</div><div class="stat-sub" style="color:${rev-exp>=0?"#166534":"#b91c1c"}">${rev-exp>=0?"✓ Positivo":"⚠ Negativo"}</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#d9770618">📋</div><div><div class="stat-value">${pending}</div><div class="stat-label">Órdenes Pendientes</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:${lowStock>0?"#b91c1c18":"#16653418"}">⚠️</div><div><div class="stat-value">${lowStock}</div><div class="stat-label">Stock Bajo</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#1d4ed818">👥</div><div><div class="stat-value">${DB.clients.length}</div><div class="stat-label">Total Clientes</div></div></div>
    </div>
    <div class="two-col" style="margin-bottom:16px">
      <div class="card">
        <div style="font-weight:700;font-size:14px;color:#5a2e0a;margin-bottom:10px">Productos Más Vendidos</div>
        ${topP.length===0?`<p style="color:#b09070;font-size:13px">Sin ventas aún</p>`:topP.map((p,i)=>`
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0e4d0;font-size:13px">
            <span>${esc(p.name)}</span>${badge(p.qty+" uds","#7a3f10")}
          </div>`).join("")}
      </div>
      <div class="card">
        <div style="font-weight:700;font-size:14px;color:#5a2e0a;margin-bottom:10px">Órdenes Recientes</div>
        ${recent.length===0?`<p style="color:#b09070;font-size:13px">Sin órdenes</p>`:recent.map(o=>{
          const cl=DB.clients.find(c=>c.id===o.clientId);
          return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0e4d0">
            <div><div style="font-size:13px;font-weight:600;color:#3a1800">${esc(cl?.name||"Sin cliente")}</div><div style="font-size:11px;color:#a07850">${esc(o.date)}</div></div>
            <div style="text-align:right"><div style="font-weight:700;font-size:13px">${fmt(sym,o.total)}</div>${badge(o.status,STATUS_COLORS[o.status]||"#7a3f10")}</div>

// ── INGREDIENTS ────────────────────────────────────────────────────────────

  const sym=getSym();
  const low=DB.ingredients.filter(i=>+i.quantity<=+i.minStock&&+i.minStock>0);
  const search=(document.getElementById("ing-search")||{}).value||"";
  const filtered=DB.ingredients.filter(i=>i.name.toLowerCase().includes(search.toLowerCase()));
  document.getElementById("page-ingredients").innerHTML=`
    <div class="page-header"><h2>Inventario De Ingredientes</h2>${btnHtml("+ Agregar","openIngModal()","primary")}</div>
    ${low.length>0?`<div class="alert-bar">⚠️ Stock bajo: ${low.map(i=>esc(i.name)+"("+i.quantity+")").join(", ")}</div>`:""}
    <input class="input-field" id="ing-search" placeholder="🔍 Buscar…" value="${esc(search)}" oninput="renderIngredients()" style="max-width:300px;margin-bottom:12px"/>
    <div class="table-wrap"><table>
      <thead><tr><th>Ingrediente</th><th>Unidad</th><th>Costo</th><th>Stock</th><th>Mín.</th><th>Estado</th><th></th></tr></thead>
      <tbody>${filtered.map(i=>{const isLow=+i.quantity<=+i.minStock&&+i.minStock>0;return `

        <td>${fmt(sym,i.cost)}</td>
        <td style="color:${isLow?"#dc2626":"#2a1200"};font-weight:${isLow?700:400}">${i.quantity}</td>
        <td style="color:#9a7050">${i.minStock||"—"}</td>
        <td>${badge(isLow?"⚠ Bajo":"✓ OK",isLow?"#dc2626":"#166534")}</td>
        <td><div class="flex-row">
          <button class="icon-btn" style="color:#7a3f10" onclick="openIngModal('${i.id}')">✏️</button>
          <button class="icon-btn" style="color:#b91c1c" onclick="delIng('${i.id}')">🗑️</button>

function openIngModal(id=""){
  const ing=DB.ingredients.find(i=>i.id===id)||{};
  openModal(id?"Editar Ingrediente":"Nuevo Ingrediente",`
    ${fieldHtml("Nombre",`<input class="input-field" id="m-name" value="${esc(ing.name||"")}" placeholder="Ej: Harina de trigo"/>`)}
    <div class="grid2">
      ${fieldHtml("Unidad",`<select class="input-field" id="m-unit">${UNITS.map(u=>`<option${u===ing.unit?" selected":""}>${u}</option>`).join("")}</select>`)}
      ${fieldHtml("Costo",`<input class="input-field" id="m-cost" type="number" value="${ing.cost||""}" placeholder="0.00"/>`)}
      ${fieldHtml("Stock Actual",`<input class="input-field" id="m-qty" type="number" value="${ing.quantity||""}"/>`)}
      ${fieldHtml("Stock Mínimo",`<input class="input-field" id="m-min" type="number" value="${ing.minStock||""}" placeholder="0"/>`)}
    </div>
    <div class="modal-footer">
      ${btnHtml("Cancelar","closeModal()","secondary")}
      ${btnHtml("✓ Guardar",`saveIng('${id}')","primary`)}
    </div>`);
}

async function saveIng(id){
  const name=val("m-name");if(!name)return;
  const obj={id:id||uid(),name,unit:val("m-unit"),cost:+val("m-cost"),quantity:+val("m-qty"),minStock:+val("m-min")};
  if(id){DB.ingredients=DB.ingredients.map(i=>i.id===id?obj:i);}else{DB.ingredients.push(obj);}
  await saveIng_cloud(obj);closeModal();renderIngredients();renderNav();
}

async function delIng(id){
  if(!confirm("¿Eliminar este ingrediente?"))return;
  DB.ingredients=DB.ingredients.filter(i=>i.id!==id);
  await delIng_cloud(id);renderIngredients();renderNav();
}

let recItems=[];
function openRecModal(id=""){
  const r=DB.recipes.find(x=>x.id===id)||{name:"",description:"",servings:1,laborHours:0,instructions:"",items:[]};
  recItems=[...r.items];
  openModal(id?"Editar Receta":"Nueva Receta",buildRecForm(r,id),true);
}

function buildRecForm(r,id){
  const sym=getSym();
  const ingOpts=DB.ingredients.map(i=>`<option value="${i.id}">${esc(i.name)} (${esc(i.unit)})</option>`).join("");
  const itemsHtml=recItems.map((it,idx)=>{const ing=DB.ingredients.find(i=>i.id===it.ingredientId);return `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #e8d0b0;font-size:13px">
      <span>${esc(ing?.name)} — ${it.quantity} ${esc(ing?.unit)}</span>
      <div class="flex-row"><span style="color:#7a3f10;font-weight:600">${fmt(sym,(+ing?.cost||0)*it.quantity)}</span>
      <button class="icon-btn" style="color:#b91c1c" onclick="removeRecItem(${idx})">✕</button></div>
    </div>`;}).join("");
  const fIC=recItems.reduce((s,it)=>{const i=DB.ingredients.find(x=>x.id===it.ingredientId);return s+(i?+i.cost*it.quantity:0);},0);
  const fTC=fIC+(+(r.laborHours||document.getElementById("m-labor")?.value||0))*(+DB.settings.labor+(+DB.settings.overhead));
  return `
    <div class="grid2">
      ${fieldHtml("Nombre",`<input class="input-field" id="m-name" value="${esc(r.name||"")}"/>`)}
      ${fieldHtml("Descripción",`<input class="input-field" id="m-desc" value="${esc(r.description||"")}"/>`)}
      ${fieldHtml("Porciones",`<input class="input-field" id="m-serv" type="number" value="${r.servings||1}"/>`)}
      ${fieldHtml("Horas De Trabajo",`<input class="input-field" id="m-labor" type="number" value="${r.laborHours||0}" onchange="refreshRecForm('${r.id||""}')"/>`)}
    </div>
    ${fieldHtml("Instrucciones",`<textarea class="input-field" id="m-inst" placeholder="Pasos de preparación…">${esc(r.instructions||"")}</textarea>`)}
    <div class="cost-box">
      <div style="font-size:13px;font-weight:700;color:#5a2e0a;margin-bottom:8px">Ingredientes De La Receta</div>
      <div id="rec-items-list">${itemsHtml}</div>
      <div class="flex-row" style="margin-top:10px">
        <select class="input-field" id="m-ing-sel" style="flex:2"><option value="">Seleccionar ingrediente…</option>${ingOpts}</select>
        <input class="input-field" id="m-ing-qty" type="number" placeholder="Cant." style="flex:1;min-width:65px"/>
        <button class="btn btn-primary btn-sm" onclick="addRecItem()">+</button>
      </div>
      ${recItems.length>0?`<div class="cost-summary">Ingredientes: <strong>${fmt(sym,fIC)}</strong> · Total: <strong>${fmt(sym,fTC)}</strong> · Sugerido: <strong style="color:#166534">${fmt(sym,fTC*(1+(+DB.settings.margin/100)))}</strong></div>`:""}
    </div>
    <div class="modal-footer">
      ${btnHtml("Cancelar","closeModal()","secondary")}
      ${btnHtml("✓ Guardar",`saveRec('${id}')","primary`)}
    </div>`;
}

function addRecItem(){
  const ingId=val("m-ing-sel");const qty=+val("m-ing-qty");
  if(!ingId||!qty)return;
  const ex=recItems.findIndex(i=>i.ingredientId===ingId);
  if(ex>=0)recItems[ex].quantity=qty;else recItems.push({ingredientId:ingId,quantity:qty});
  const r={name:val("m-name"),description:val("m-desc"),servings:+val("m-serv"),laborHours:+val("m-labor"),instructions:val("m-inst"),items:recItems};
  document.getElementById("modal-body").innerHTML=buildRecForm(r,"");
}

function removeRecItem(idx){
  recItems.splice(idx,1);
  const r={name:val("m-name"),description:val("m-desc"),servings:+val("m-serv"),laborHours:+val("m-labor"),instructions:val("m-inst"),items:recItems};
  document.getElementById("modal-body").innerHTML=buildRecForm(r,"");
}

async function saveRec(id){
  const name=val("m-name");if(!name)return;
  const obj={id:id||uid(),name,description:val("m-desc"),servings:+val("m-serv"),laborHours:+val("m-labor"),instructions:val("m-inst"),items:[...recItems]};
  if(id){DB.recipes=DB.recipes.map(r=>r.id===id?obj:r);}else{DB.recipes.push(obj);}
  await saveRec_cloud(obj);closeModal();renderRecipes();
}

async function delRec(id){
  if(!confirm("¿Eliminar esta receta?"))return;
  DB.recipes=DB.recipes.filter(r=>r.id!==id);await delRec_cloud(id);renderRecipes();
}

        ${topP.length===0?`<p style="color:#b09070;font-size:13px">Sin datos</p>`:topP.map((p,i)=>`
          <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0e4d0">
            <div class="flex-row"><span style="font-weight:700;color:#c9956a;font-size:13px">#${i+1}</span><span style="font-size:13px">${esc(p.name)}</span></div>
            ${badge(p.qty+" uds","#7a3f10")}
          </div>`).join("")}
      </div>
    </div>`;
}

function setRepRange(r){repRange=r;renderReports();}

// ── SETTINGS ───────────────────────────────────────────────────────────────
function renderSettings(){
  const sym=getSym();
  const curOpts=CURRENCIES.map(c=>`<option value="${c.code}"${c.code===DB.settings.currency?" selected":""}>${esc(c.name)}</option>`).join("");
  const cur=CURRENCIES.find(c=>c.code===DB.settings.currency)||CURRENCIES[0];
  document.getElementById("page-settings").innerHTML=`
    <h2>Mi Configuración</h2>
    <div style="max-width:540px">
      <div class="card" style="margin-bottom:14px">
        <div style="font-weight:700;font-size:14px;color:#5a2e0a;margin-bottom:12px">🌍 Moneda Del Negocio</div>
        ${fieldHtml("Moneda",`<select class="input-field" id="s-currency">${curOpts}</select>`)}
        <div style="background:#fdf0e3;border-radius:10px;padding:10px;font-size:13px;color:#5a2e0a">Símbolo: <strong>${cur.symbol}</strong> · Código: <strong>${cur.code}</strong></div>
      </div>
      <div class="card" style="margin-bottom:14px">
        <div style="font-weight:700;font-size:14px;color:#5a2e0a;margin-bottom:12px">💰 Parámetros De Precio</div>
        ${fieldHtml("Margen De Ganancia (%)",`<input class="input-field" id="s-margin" type="number" value="${DB.settings.margin}"/>`)}
        ${fieldHtml("Mano De Obra ("+sym+"/hora)",`<input class="input-field" id="s-labor" type="number" value="${DB.settings.labor}"/>`)}
        ${fieldHtml("Costos Fijos ("+sym+"/hora)",`<input class="input-field" id="s-overhead" type="number" value="${DB.settings.overhead}"/>`)}
      </div>
      <div class="card" style="margin-bottom:16px">
        <div style="font-weight:700;font-size:14px;color:#5a2e0a;margin-bottom:8px">📐 Fórmula Aplicada</div>
        <div style="background:#f5e6d3;border-radius:10px;padding:12px;font-size:13px;color:#4a2000;line-height:1.9">
          <strong>Precio =</strong> (Ingredientes + Horas×${sym}${DB.settings.labor} + Horas×${sym}${DB.settings.overhead}) × (1 + ${DB.settings.margin}%)
        </div>
      </div>
      <div class="flex-row">
        <button class="btn btn-primary" onclick="saveSettings()">✓ Guardar Cambios</button>
        <button class="btn btn-success btn-sm" onclick="exportExcel()">📥 Exportar Excel</button>
        <span id="saved-msg" style="color:#166534;font-size:13px;font-weight:700;display:none">✓ Guardado</span>
      </div>
    </div>`;
}

async function saveSettings(){
  DB.settings={margin:+val("s-margin"),labor:+val("s-labor"),overhead:+val("s-overhead"),currency:val("s-currency")};
  await saveSettings_cloud(DB.settings);
  const msg=document.getElementById("saved-msg");
  if(msg){msg.style.display="inline";setTimeout(()=>msg.style.display="none",2200);}
  renderNav();
}

// ── EXCEL EXPORT ───────────────────────────────────────────────────────────
function exportExcel(){
  const sym=getSym();
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Ingrediente","Unidad","Costo","Stock","Mín","Estado"],...DB.ingredients.map(i=>[i.name,i.unit,+i.cost,+i.quantity,+i.minStock,+i.quantity<=+i.minStock?"BAJO":"OK"])]),"Ingredientes");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Producto","Receta","Costo","Precio","Margen%"],...DB.products.map(p=>[p.name,DB.recipes.find(r=>r.id===p.recipeId)?.name||"",+p.cost,productPrice(p),(((productPrice(p))-(+p.cost))/Math.max(+p.cost,0.01)*100).toFixed(1)])]),"Productos");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Fecha","Cliente","Estado","Total","Productos"],...DB.orders.map(o=>[o.date,DB.clients.find(c=>c.id===o.clientId)?.name||"—",o.status,+o.total,o.items.map(it=>`${DB.products.find(p=>p.id===it.productId)?.name||"?"} x${it.quantity}`).join(", ")])]),"Órdenes");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Fecha","Categoría","Descripción","Monto"],...DB.expenses.map(e=>[e.date,e.category,e.description,+e.amount])]),"Gastos");
  const rev=DB.orders.filter(o=>o.status==="completada").reduce((s,o)=>s+(+o.total),0);
  const exp=DB.expenses.reduce((s,e)=>s+(+e.amount),0);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Resumen"],[],["Ingresos",rev],["Gastos",exp],["Utilidad",rev-exp],[],["Moneda",DB.settings.currency],["Margen%",DB.settings.margin]]),"Resumen");
  XLSX.writeFile(wb,`MyBakingPro_${new Date().toISOString().slice(0,10)}.xlsx`);
}

document.getElementById('auth-screen').style.display = 'flex';
document.getElementById('app-container').style.display = 'none';
renderNav();

_supabase.auth.onAuthStateChange(async (event, session) => {
  if (session && session.user) {
    currentUser = session.user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-container').style.display = 'flex';
    document.getElementById('user-bar').style.display = 'flex';
    document.getElementById('user-email-display').textContent = session.user.email;
    await loadFromCloud();
    renderNav();
    renderPage('dashboard');
  } else if (event === 'SIGNED_OUT') {
    currentUser = null;
    window.location.reload();
  }
});

_supabase.auth.getSession().then(async ({ data: { session } }) => {
  if (session && session.user) {
    currentUser = session.user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-container').style.display = 'flex';
    document.getElementById('user-bar').style.display = 'flex';
    document.getElementById('user-email-display').textContent = session.user.email;
    await loadFromCloud();
    renderNav();
    renderPage('dashboard');
  }
});
