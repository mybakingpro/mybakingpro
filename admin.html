<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MyBakingPro — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#faf5ed;color:#2a1200;min-height:100vh}
#login-screen{position:fixed;inset:0;background:#faf5ed;display:flex;align-items:center;justify-content:center;z-index:999}
#login-screen.hidden{display:none}
.login-box{background:#fffaf4;border-radius:20px;border:1px solid #ead9c0;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(42,18,0,0.12);text-align:center}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:28px;color:#2a1200;font-weight:700;margin-bottom:4px}
.login-sub{font-size:13px;color:#9a7050;margin-bottom:28px}
.field{margin-bottom:14px;text-align:left}
.field label{display:block;font-size:11px;font-weight:700;color:#7a4a1e;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.07em}
.input{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #e2c9a4;background:#fffaf4;font-size:14px;color:#2a1200;outline:none;font-family:'Nunito',sans-serif}
.btn-login{width:100%;padding:12px;border-radius:12px;border:none;background:#2a1200;color:#f5c58a;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.btn-login:hover{background:#7a3f10}
.error-msg{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:8px 12px;color:#b91c1c;font-size:13px;margin-bottom:12px;display:none}
.error-msg.show{display:block}
#admin-panel{display:none}
#admin-panel.show{display:block}
.topbar{background:#2a1200;padding:14px 32px;display:flex;justify-content:space-between;align-items:center}
.topbar-logo{font-family:'Cormorant Garamond',serif;font-size:22px;color:#f5c58a;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar-email{font-size:12px;color:rgba(245,197,138,0.6)}
.btn-logout{background:none;border:1px solid rgba(245,197,138,0.3);color:rgba(245,197,138,0.7);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'Nunito',sans-serif}
.btn-logout:hover{background:rgba(245,197,138,0.1)}
.main{max-width:1100px;margin:0 auto;padding:32px 24px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:#fffaf4;border-radius:16px;border:1px solid #ead9c0;padding:20px 24px}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:#2a1200;line-height:1}
.stat-label{font-size:12px;color:#9a7050;margin-top:4px;font-weight:600}
.stat-sub{font-size:11px;color:#c9956a;margin-top:4px}
.section-title{font-family:'Cormorant Garamond',serif;font-size:24px;color:#2a1200;font-weight:700}
.search-bar{display:flex;gap:12px;margin-bottom:16px;align-items:center}
.search-input{padding:9px 14px;border-radius:10px;border:1.5px solid #e2c9a4;background:#fffaf4;font-size:14px;color:#2a1200;outline:none;font-family:'Nunito',sans-serif;width:280px}
.table-wrap{background:#fffaf4;border-radius:16px;border:1px solid #ead9c0;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:12px 16px;color:#5a2e0a;font-weight:700;font-size:11px;text-transform:uppercase;text-align:left;background:#f5e6d3;letter-spacing:0.05em}
td{padding:12px 16px;border-bottom:1px solid #f0e4d0;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fdf5e9}
.badge-active{background:#dcfce7;color:#166534;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700}
.badge-inactive{background:#fee2e2;color:#b91c1c;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700}
.badge-admin{background:#fef3c7;color:#92400e;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700}
.btn-action{border:none;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;font-weight:600;font-family:'Nunito',sans-serif;color:#fff}
.btn-action:hover{opacity:0.85}
.loading{text-align:center;padding:40px;color:#9a7050;font-size:14px}
.avatar{width:36px;height:36px;border-radius:50%;background:#f5e6d3;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#7a3f10;margin-right:10px;vertical-align:middle}
.refresh-btn{background:#7a3f10;color:#fff;border:none;border-radius:10px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600;font-family:'Nunito',sans-serif}
.refresh-btn:hover{opacity:0.85}
.alert{border-radius:12px;padding:12px 16px;margin-bottom:20px;font-size:13px;font-weight:600}
.alert-warn{background:#fef3c7;border:1.5px solid #d97706;color:#92400e}
.alert-ok{background:#dcfce7;border:1.5px solid #86efac;color:#166534}
.alert-err{background:#fee2e2;border:1.5px solid #fca5a5;color:#b91c1c}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🎂 MyBakingPro</div>
    <div class="login-sub">Panel de Administración</div>
    <div class="error-msg" id="error-msg"></div>
    <div class="field">
      <label>Correo Electrónico</label>
      <input class="input" id="admin-email" type="email" placeholder="tu@correo.com"/>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input class="input" id="admin-password" type="password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter')doAdminLogin()"/>
    </div>
    <button class="btn-login" onclick="doAdminLogin()">Entrar al Panel</button>
  </div>
</div>

<div id="admin-panel">
  <div class="topbar">
    <div class="topbar-logo">🎂 MyBakingPro — Admin</div>
    <div class="topbar-right">
      <span class="topbar-email" id="admin-email-display"></span>
      <button class="btn-logout" onclick="doAdminLogout()">Salir</button>
    </div>
  </div>

  <div class="main">
    <div class="alert" id="admin-alert" style="display:none"></div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val" id="stat-total">—</div>
        <div class="stat-label">Total Usuarios</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-active">—</div>
        <div class="stat-label">Usuarios Activos</div>
        <div class="stat-sub">Con acceso completo</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-inactive">—</div>
        <div class="stat-label">Sin Acceso</div>
        <div class="stat-sub">is_paid = false</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-revenue">—</div>
        <div class="stat-label">Ingresos Estimados</div>
        <div class="stat-sub">$12.99 × activos/mes</div>
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="section-title">Usuarios Registrados</div>
      <button class="refresh-btn" onclick="loadUsers()">🔄 Actualizar</button>
    </div>

    <div class="search-bar">
      <input class="search-input" id="search-input" placeholder="🔍 Buscar por correo..." oninput="filterUsers()"/>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Usuario</th>
            <th>Fecha de Registro</th>
            <th>Estado</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="users-table">
          <tr><td colspan="4" class="loading">Cargando usuarios...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://bpchubmwddaibfaxdglk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJwY2h1Ym13ZGRhaWJmYXhkZ2xrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDE5ODYsImV4cCI6MjA5MTkxNzk4Nn0.Df0DMHPnCxF5YRmHpz1_cTZ1aKufgzkJTWV8sxnFpck';
const ADMIN_EMAIL = 'coachjackiegrant@gmail.com';

const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: true,
    storageKey: 'mbp-admin-auth',
    storage: {
      getItem: (key) => { try { return window.sessionStorage.getItem(key); } catch { return null; } },
      setItem: (key, value) => { try { window.sessionStorage.setItem(key, value); } catch {} },
      removeItem: (key) => { try { window.sessionStorage.removeItem(key); } catch {} }
    }
  }
});

let allUsers = [];

async function doAdminLogin() {
  const email = document.getElementById('admin-email').value.trim();
  const password = document.getElementById('admin-password').value;
  const errEl = document.getElementById('error-msg');
  errEl.classList.remove('show');

  if (email !== ADMIN_EMAIL) {
    errEl.textContent = 'Solo el administrador puede acceder a este panel.';
    errEl.classList.add('show');
    return;
  }

  const { error } = await _supabase.auth.signInWithPassword({ email, password });
  if (error) {
    errEl.textContent = 'Correo o contraseña incorrectos.';
    errEl.classList.add('show');
    return;
  }

  showAdminPanel(email);
}

function showAdminPanel(email) {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('admin-panel').classList.add('show');
  document.getElementById('admin-email-display').textContent = email;
  loadUsers();
}

async function doAdminLogout() {
  await _supabase.auth.signOut();
  window.location.reload();
}

async function loadUsers() {
  document.getElementById('users-table').innerHTML = '<tr><td colspan="4" class="loading">Cargando usuarios...</td></tr>';

  const { data, error } = await _supabase
    .from('users')
    .select('id, email, is_paid, created_at')
    .order('created_at', { ascending: false });

  if (error) {
    document.getElementById('users-table').innerHTML =
      `<tr><td colspan="4" class="loading" style="color:#b91c1c">Error al cargar usuarios: ${error.message}</td></tr>`;
    showAlert('❌ ' + error.message, 'err');
    return;
  }

  allUsers = (data || []).map(u => ({ ...u, isAdmin: u.email === ADMIN_EMAIL }));
  updateStats();
  renderUsers(allUsers);
}

function updateStats() {
  const total = allUsers.length;
  const active = allUsers.filter(u => u.is_paid).length;
  const inactive = total - active;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-inactive').textContent = inactive;
  document.getElementById('stat-revenue').textContent = '$' + (active * 12.99).toFixed(2);
}

function renderUsers(users) {
  if (users.length === 0) {
    document.getElementById('users-table').innerHTML =
      '<tr><td colspan="4" class="loading">No hay usuarios registrados aún.</td></tr>';
    return;
  }

  document.getElementById('users-table').innerHTML = users.map(u => {
    const initial = (u.email || '?')[0].toUpperCase();
    const date = u.created_at ? new Date(u.created_at).toLocaleDateString('es') : '—';
    const statusBadge = u.isAdmin
      ? '<span class="badge-admin">👑 Admin</span>'
      : u.is_paid
        ? '<span class="badge-active">✓ Activo</span>'
        : '<span class="badge-inactive">✗ Sin acceso</span>';
    const actionBtn = u.isAdmin ? '—' : u.is_paid
      ? `<button class="btn-action" style="background:#b91c1c" onclick="toggleAccess('${u.id}', false)">🔒 Quitar acceso</button>`
      : `<button class="btn-action" style="background:#166534" onclick="toggleAccess('${u.id}', true)">✓ Dar acceso</button>`;

    return `<tr>
      <td><span class="avatar">${initial}</span>${u.email || u.id.slice(0,8)+'...'}</td>
      <td style="color:#9a7050">${date}</td>
      <td>${statusBadge}</td>
      <td>${actionBtn}</td>
    </tr>`;
  }).join('');
}

function filterUsers() {
  const search = document.getElementById('search-input').value.toLowerCase();
  renderUsers(allUsers.filter(u => (u.email || u.id).toLowerCase().includes(search)));
}

async function toggleAccess(userId, isPaid) {
  const { error } = await _supabase
    .from('users')
    .update({ is_paid: isPaid })
    .eq('id', userId);

  if (error) { showAlert('❌ Error: ' + error.message, 'err'); return; }

  const user = allUsers.find(u => u.id === userId);
  if (user) user.is_paid = isPaid;

  showAlert(isPaid ? '✅ Acceso activado.' : '🔒 Acceso removido.', isPaid ? 'ok' : 'warn');
  updateStats();
  filterUsers();
}

function showAlert(msg, type = 'ok') {
  const el = document.getElementById('admin-alert');
  el.textContent = msg;
  el.className = 'alert alert-' + type;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

_supabase.auth.getSession().then(({ data: { session } }) => {
  if (session && session.user && session.user.email === ADMIN_EMAIL) {
    showAdminPanel(session.user.email);
  }
});
</script>
</body>
</html>
